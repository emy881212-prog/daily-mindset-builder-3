<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Email | Daily Mindset</title>
  <link rel="stylesheet" href="performance.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: "Manrope", "Segoe UI", sans-serif; background: linear-gradient(180deg, #fffdfd 0%, #fdf4f7 20%, #f8edef 50%, #fdf1f4 80%, #fffdfd 100%); color: #3f2a34; }
    .wrap { height: 100dvh; overflow-y: auto; padding: max(16px, env(safe-area-inset-top)) 16px max(20px, env(safe-area-inset-bottom)); display: grid; align-content: start; gap: 14px; }
    .card { border-radius: 26px; padding: 18px; background: rgba(255,255,255,0.58); border: 1px solid rgba(255,255,255,0.4); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); box-shadow: 0 8px 32px rgba(214,174,191,0.12); }
    h1 { font-family: Georgia, serif; font-style: italic; font-size: 44px; }
    p { color: #725967; line-height: 1.6; }
    .btn { border: 1px solid rgba(63,42,52,0.18); background: rgba(255,255,255,0.72); border-radius: 999px; padding: 12px 16px; font-weight: 700; width: fit-content; cursor: pointer; }
  </style>
</head>
<body>
  <main class="wrap">
    <button class="btn" type="button" onclick="window.location.href='settings.html'">← Back to Settings</button>
    <section class="card">
      <h1>Email</h1>
      <p>Email management controls are ready. Connect your auth provider flow here for updates and verification.</p>
    </section>
  </main>
  <script src="performance.js"></script>
</body>
</html>
