<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Saved Quotes</title>
  <link rel="stylesheet" href="performance.css">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --background-top: #f7f5f6;
      --background-bottom: #817e8c;
      --panel-light: #ead8da;
      --panel-dark: #c5adb0;
      --button-light: #efb5aa;
      --button-middle: #d9a099;
      --button-dark: #ae8985;
      --accent: #bd7f7a;
      --accent-dark: #8e6463;
      --dark: #151416;
      --soft-dark: #41353a;
      --white: #ffffff;
    }

    html {
      min-height: 100%;
      background: var(--background-bottom);
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
      color: var(--dark);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 25% 8%, rgba(255, 255, 255, 0.85), transparent 30%),
        linear-gradient(180deg, var(--background-top) 0%, #ddd9df 39%, var(--background-bottom) 100%);
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      touch-action: manipulation;
    }

    .bubbles {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .bubble {
      position: absolute;
      bottom: -55px;
      width: var(--size);
      height: var(--size);
      border: 1px solid rgba(255, 255, 255, 0.45);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.11);
      box-shadow:
        inset 0 0 12px rgba(255, 255, 255, 0.28),
        0 4px 17px rgba(255, 255, 255, 0.08);
      animation: rise var(--duration) linear infinite;
      animation-delay: var(--delay);
    }

    .bubble:nth-child(1) { left: 7%; --size: 18px; --duration: 17s; --delay: -4s; }
    .bubble:nth-child(2) { left: 24%; --size: 11px; --duration: 14s; --delay: -9s; }
    .bubble:nth-child(3) { left: 43%; --size: 25px; --duration: 21s; --delay: -13s; }
    .bubble:nth-child(4) { left: 63%; --size: 15px; --duration: 16s; --delay: -6s; }
    .bubble:nth-child(5) { left: 79%; --size: 21px; --duration: 19s; --delay: -11s; }
    .bubble:nth-child(6) { left: 92%; --size: 12px; --duration: 15s; --delay: -7s; }

    @keyframes rise {
      0% { transform: translate3d(0, 0, 0); opacity: 0; }
      12% { opacity: 0.7; }
      50% { transform: translate3d(11px, -55vh, 0); }
      100% { transform: translate3d(-8px, -115vh, 0); opacity: 0; }
    }

    .app {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      min-height: 100dvh;
      margin: 0 auto;
      padding:
        max(12px, env(safe-area-inset-top))
        20px
        max(24px, env(safe-area-inset-bottom));
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .logo-button {
      display: grid;
      place-items: center;
      width: 55px;
      min-width: 55px;
      height: 55px;
      border: 10px solid rgba(255, 255, 255, 0.94);
      border-radius: 50%;
      color: white;
      background: #17181c;
      box-shadow:
        0 3px 8px rgba(0, 0, 0, 0.18),
        inset 0 0 0 1px rgba(255, 255, 255, 0.06);
    }

    .logo-symbol {
      font-size: 25px;
      line-height: 1;
      pointer-events: none;
    }

    .brand-name {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 16px;
      font-weight: 500;
    }

    .title-wrapper {
      display: flex;
      justify-content: center;
      width: 100%;
      margin: 0 auto 12px;
    }

    .title-box {
      width: fit-content;
      max-width: 95%;
      padding: 8px 27px;
      text-align: center;
      background: rgba(255, 255, 255, 0.7);
      box-shadow: 0 7px 22px rgba(77, 70, 77, 0.06);
    }

    .page-title {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(31px, 8.7vw, 39px);
      font-weight: 500;
      line-height: 1;
      letter-spacing: -1.3px;
    }

    .page-subtitle {
      margin-top: 6px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 13px;
      color: rgba(43, 37, 40, 0.58);
    }

    .quotes-panel {
      min-height: 682px;
      padding: 78px 14px 43px;
      border: 2px solid rgba(177, 112, 112, 0.5);
      border-radius: 66px;
      background:
        radial-gradient(circle at 50% 7%, rgba(255, 255, 255, 0.23), transparent 34%),
        linear-gradient(145deg, var(--panel-light), var(--panel-dark));
      box-shadow:
        0 13px 23px rgba(45, 38, 48, 0.29),
        inset 5px 5px 14px rgba(255, 255, 255, 0.23),
        inset -7px -7px 15px rgba(104, 75, 84, 0.15);
    }

    .quotes-buttons {
      display: flex;
      flex-direction: column;
      gap: 36px;
    }

    .quotes-button {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 132px;
      padding: 18px 29px;
      border: 1.5px solid #171517;
      border-radius: 999px;
      color: var(--dark);
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(21px, 5.7vw, 26px);
      line-height: 1.18;
      text-align: center;
      background:
        linear-gradient(100deg, var(--button-light) 0%, var(--button-middle) 52%, var(--button-dark) 100%);
      box-shadow:
        0 12px 10px rgba(61, 49, 57, 0.37),
        inset 3px 3px 5px rgba(255, 255, 255, 0.32),
        inset -4px -4px 8px rgba(83, 56, 57, 0.18);
      transition: transform 160ms ease, box-shadow 160ms ease, filter 160ms ease;
    }

    .quotes-button:hover { filter: brightness(1.035); }

    .quotes-button:active {
      transform: translateY(4px) scale(0.986);
      box-shadow:
        0 6px 7px rgba(61, 49, 57, 0.31),
        inset 2px 2px 5px rgba(90, 59, 63, 0.14);
    }

    .button-content,
    .button-icon,
    .button-label,
    .button-description {
      pointer-events: none;
    }

    .button-content {
      display: block;
      max-width: 260px;
    }

    .button-icon {
      display: block;
      margin-bottom: 6px;
      font-size: 29px;
    }

    .button-label { display: block; }

    .button-description {
      display: block;
      margin-top: 5px;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 11px;
      line-height: 1.35;
      color: rgba(51, 40, 45, 0.62);
    }

    .save-main-button {
      display: block;
      width: 73%;
      min-height: 56px;
      margin: 21px auto 0;
      border: 1.5px solid var(--dark);
      border-radius: 999px;
      color: var(--dark);
      background: #e1e1e1;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.8px;
      box-shadow:
        0 7px 8px rgba(34, 30, 38, 0.35),
        inset 2px 2px 4px rgba(255, 255, 255, 0.78);
      transition: transform 160ms ease, box-shadow 160ms ease;
    }

    .save-main-button:active { transform: translateY(3px); }

    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 13px;
      visibility: hidden;
      opacity: 0;
      background: rgba(27, 22, 29, 0.56);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: opacity 230ms ease, visibility 230ms ease;
    }

    .modal-overlay.open {
      visibility: visible;
      opacity: 1;
    }

    .quotes-modal {
      width: 100%;
      max-width: 430px;
      max-height: calc(100vh - 26px);
      max-height: calc(100dvh - 26px);
      overflow-y: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      padding: 17px 17px max(23px, env(safe-area-inset-bottom));
      border: 1px solid rgba(255, 255, 255, 0.82);
      border-radius: 35px 35px 28px 28px;
      background:
        radial-gradient(circle at 10% 3%, rgba(255, 255, 255, 0.98), transparent 27%),
        linear-gradient(150deg, rgba(255, 250, 250, 0.99), rgba(232, 205, 208, 0.99));
      box-shadow:
        0 -13px 45px rgba(26, 21, 28, 0.36),
        inset 0 1px 0 rgba(255, 255, 255, 0.95);
      transform: translate3d(0, 105%, 0);
      transition: transform 300ms cubic-bezier(0.22, 0.82, 0.32, 1);
    }

    .modal-overlay.open .quotes-modal { transform: translate3d(0, 0, 0); }

    .modal-handle {
      width: 53px;
      height: 5px;
      margin: 0 auto 17px;
      border-radius: 999px;
      background: rgba(61, 47, 53, 0.23);
    }

    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 15px;
    }

    .modal-label {
      margin-bottom: 4px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      color: var(--accent-dark);
    }

    .modal-title {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 30px;
      font-weight: 500;
      line-height: 1.06;
      letter-spacing: -1px;
    }

    .modal-description {
      margin-top: 6px;
      font-size: 12px;
      line-height: 1.45;
      color: rgba(51, 41, 46, 0.58);
    }

    .close-button {
      display: grid;
      place-items: center;
      width: 42px;
      min-width: 42px;
      height: 42px;
      border: 1px solid rgba(76, 55, 62, 0.18);
      border-radius: 50%;
      color: var(--soft-dark);
      background: rgba(255, 255, 255, 0.65);
      font-size: 23px;
      box-shadow:
        0 5px 13px rgba(72, 52, 60, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.91);
    }

    .modal-content { margin-top: 20px; }

    .search-box {
      width: 100%;
      min-height: 48px;
      padding: 11px 15px;
      border: 1px solid rgba(112, 76, 84, 0.17);
      border-radius: 999px;
      outline: none;
      color: #2d2529;
      background: rgba(255, 255, 255, 0.8);
      font-size: 14px;
      box-shadow: inset 0 2px 7px rgba(91, 62, 69, 0.05);
    }

    .search-box:focus {
      border-color: rgba(174, 107, 106, 0.52);
      box-shadow: 0 0 0 4px rgba(202, 133, 132, 0.11);
    }

    .collector-summary {
      padding: 15px;
      border: 1px solid rgba(116, 79, 87, 0.14);
      border-radius: 22px;
      background:
        linear-gradient(145deg, rgba(243, 203, 198, 0.7), rgba(207, 166, 168, 0.58));
      box-shadow: 0 8px 21px rgba(93, 62, 70, 0.08);
    }

    .collector-summary-title {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 19px;
      font-weight: 600;
    }

    .collector-summary-text {
      margin-top: 7px;
      font-size: 12px;
      line-height: 1.5;
      color: rgba(58, 45, 51, 0.68);
    }

    .quote-list {
      display: flex;
      flex-direction: column;
      gap: 13px;
      margin-top: 14px;
    }

    .quote-card {
      padding: 15px;
      border: 1px solid rgba(116, 79, 87, 0.14);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.59);
      box-shadow: 0 8px 21px rgba(93, 62, 70, 0.08);
    }

    .quote-card-button {
      display: block;
      width: 100%;
      color: var(--dark);
      background: transparent;
      text-align: left;
    }

    .quote-text {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 19px;
      font-style: italic;
      line-height: 1.45;
      pointer-events: none;
    }

    .quote-author {
      margin-top: 9px;
      font-size: 11px;
      font-weight: 700;
      color: rgba(58, 44, 50, 0.58);
      pointer-events: none;
    }

    .quote-category {
      display: inline-flex;
      margin-top: 10px;
      padding: 5px 10px;
      border-radius: 999px;
      color: #684b4c;
      background: rgba(225, 176, 172, 0.48);
      font-size: 10px;
      font-weight: 800;
      pointer-events: none;
    }

    .quote-actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 13px;
    }

    .quote-action {
      min-height: 40px;
      border: 1px solid rgba(93, 65, 71, 0.14);
      border-radius: 999px;
      color: #493a40;
      background: rgba(255, 255, 255, 0.72);
      font-size: 12px;
      font-weight: 700;
    }

    .quote-action.favorite.active {
      color: white;
      background: linear-gradient(110deg, #c78a84, #916968);
    }

    .quote-action.delete { color: #8d5559; }

    .collections-grid,
    .insights-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 11px;
    }

    .collection-button,
    .insight-card {
      min-height: 115px;
      padding: 14px 10px;
      border: 1px solid rgba(114, 77, 85, 0.13);
      border-radius: 22px;
      color: var(--dark);
      background: rgba(255, 255, 255, 0.6);
      text-align: center;
      box-shadow: 0 7px 19px rgba(93, 62, 70, 0.07);
    }

    .collection-icon,
    .collection-name,
    .collection-count {
      display: block;
      pointer-events: none;
    }

    .collection-icon,
    .insight-icon { font-size: 27px; }

    .collection-name {
      margin-top: 8px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 16px;
      font-weight: 600;
    }

    .collection-count,
    .insight-label {
      margin-top: 4px;
      font-size: 10px;
      color: rgba(59, 45, 51, 0.55);
    }

    .insight-number {
      margin-top: 7px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 28px;
      font-weight: 700;
    }

    .back-button {
      min-height: 43px;
      margin-bottom: 13px;
      padding: 9px 15px;
      border-radius: 999px;
      color: #493a40;
      background: rgba(255, 255, 255, 0.72);
      font-size: 12px;
      font-weight: 800;
    }

    .empty-state {
      padding: 31px 20px;
      border: 1px solid rgba(116, 79, 87, 0.13);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.57);
      text-align: center;
    }

    .empty-icon { font-size: 39px; }

    .empty-title {
      margin-top: 10px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 21px;
      font-weight: 600;
    }

    .empty-text {
      margin-top: 7px;
      font-size: 12px;
      line-height: 1.5;
      color: rgba(58, 45, 51, 0.62);
    }

    .modal-actions { margin-top: 19px; }

    .exit-button {
      width: 100%;
      min-height: 54px;
      border: 1px solid rgba(67, 50, 56, 0.21);
      border-radius: 999px;
      color: #46383d;
      background: rgba(255, 255, 255, 0.69);
      font-size: 15px;
      font-weight: 800;
      box-shadow:
        0 5px 12px rgba(63, 45, 52, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.88);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: max(25px, env(safe-area-inset-bottom));
      z-index: 2000;
      width: max-content;
      max-width: calc(100% - 34px);
      padding: 13px 20px;
      border-radius: 999px;
      color: white;
      background: rgba(32, 27, 33, 0.92);
      font-size: 14px;
      font-weight: 700;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 24px);
      transition: opacity 220ms ease, transform 220ms ease;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    button:focus-visible,
    input:focus-visible {
      outline: 3px solid rgba(255, 255, 255, 0.95);
      outline-offset: 3px;
    }

    @media (max-width: 370px) {
      .app { padding-left: 14px; padding-right: 14px; }
      .quotes-panel {
        min-height: 640px;
        padding-left: 11px;
        padding-right: 11px;
        border-radius: 57px;
      }
      .quotes-button { min-height: 124px; font-size: 20px; }
      .quote-actions { grid-template-columns: 1fr; }
    }

    @media (min-width: 600px) {
      .modal-overlay { align-items: center; }
      .quotes-modal {
        border-radius: 35px;
        transform: translate3d(0, 25px, 0) scale(0.97);
      }
      .modal-overlay.open .quotes-modal {
        transform: translate3d(0, 0, 0) scale(1);
      }
    }
  </style>
</head>

<body>
  <div class="bubbles" aria-hidden="true">
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>
  </div>

  <main class="app">
    <header class="header">
      <button class="logo-button" id="backToJournalButton" type="button" aria-label="Return to journal menu">
        <span class="logo-symbol">✦</span>
      </button>
      <p class="brand-name">Daily Mindset Builder</p>
    </header>

    <div class="title-wrapper">
      <div class="title-box">
        <h1 class="page-title">Saved Quotes</h1>
        <p class="page-subtitle">Every quote you save, collected in one place</p>
      </div>
    </div>

    <section class="quotes-panel">
      <div class="quotes-buttons">
        <button class="quotes-button" type="button" data-view="library">
          <span class="button-content">
            <span class="button-icon">💬</span>
            <span class="button-label">Saved Quote Library</span>
            <span class="button-description">Read, search, copy and manage all saved quotes</span>
          </span>
        </button>

        <button class="quotes-button" type="button" data-view="collector">
          <span class="button-content">
            <span class="button-icon">🗂️</span>
            <span class="button-label">Quote Collector</span>
            <span class="button-description">Automatically organize every quote the user saves</span>
          </span>
        </button>

        <button class="quotes-button" type="button" data-view="insights">
          <span class="button-content">
            <span class="button-icon">✨</span>
            <span class="button-label">Quote Insights</span>
            <span class="button-description">Discover the themes that inspire you most</span>
          </span>
        </button>
      </div>
    </section>

    <button class="save-main-button" id="saveQuotesButton" type="button">SAVE</button>
  </main>

  <div class="modal-overlay" id="modalOverlay" aria-hidden="true">
    <section class="quotes-modal" id="quotesModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-handle"></div>

      <div class="modal-header">
        <div>
          <p class="modal-label" id="modalLabel">Your saved words</p>
          <h2 class="modal-title" id="modalTitle">Saved Quote Library</h2>
          <p class="modal-description" id="modalDescription">Every quote saved in the app appears here.</p>
        </div>

        <button class="close-button" id="closeButton" type="button" aria-label="Exit saved quotes window">×</button>
      </div>

      <div class="modal-content" id="modalContent"></div>

      <div class="modal-actions">
        <button class="exit-button" id="exitButton" type="button">Exit</button>
      </div>
    </section>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite">Quotes saved ✓</div>

  <script>
    const CANONICAL_STORAGE_KEY = "dailyMindsetSavedQuotes";

    const categoryInformation = {
      Motivation: "🚀",
      Confidence: "✨",
      Peace: "🌿",
      Gratitude: "🤍",
      Growth: "🌱",
      Love: "💗",
      Success: "🏆",
      Other: "💭"
    };

    const modalOverlay = document.getElementById("modalOverlay");
    const quotesModal = document.getElementById("quotesModal");
    const modalLabel = document.getElementById("modalLabel");
    const modalTitle = document.getElementById("modalTitle");
    const modalDescription = document.getElementById("modalDescription");
    const modalContent = document.getElementById("modalContent");
    const closeButton = document.getElementById("closeButton");
    const exitButton = document.getElementById("exitButton");
    const saveQuotesButton = document.getElementById("saveQuotesButton");
    const backToJournalButton = document.getElementById("backToJournalButton");
    const viewButtons = document.querySelectorAll(".quotes-button");
    const toast = document.getElementById("toast");

    let savedQuotes = [];
    let currentView = "library";
    let toastTimer;

    function createId() {
      return `${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function escapeHTML(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function safeParse(value) {
      try {
        return JSON.parse(value);
      } catch (error) {
        return value;
      }
    }

    function inferCategory(text, suppliedCategory) {
      if (categoryInformation[suppliedCategory]) {
        return suppliedCategory;
      }

      const content = String(text || "").toLowerCase();

      if (/gratitude|grateful|thank/.test(content)) return "Gratitude";
      if (/confidence|believe in yourself|self worth|brave/.test(content)) return "Confidence";
      if (/peace|calm|breathe|stillness/.test(content)) return "Peace";
      if (/love|heart|kindness/.test(content)) return "Love";
      if (/success|achieve|goal|win/.test(content)) return "Success";
      if (/grow|growth|learn|change/.test(content)) return "Growth";
      if (/motivat|keep going|strength|courage/.test(content)) return "Motivation";

      return "Other";
    }

    function normalizeQuote(item, fallbackCategory = "Other") {
      if (typeof item === "string") {
        const text = item.trim();
        if (!text) return null;

        return {
          id: createId(),
          text,
          author: "",
          category: inferCategory(text, fallbackCategory),
          note: "",
          favorite: false,
          createdAt: new Date().toISOString()
        };
      }

      if (!item || typeof item !== "object") {
        return null;
      }

      const text = String(
        item.text ||
        item.quote ||
        item.content ||
        item.message ||
        item.quoteText ||
        ""
      ).trim();

      if (!text) return null;

      return {
        id: String(item.id || createId()),
        text,
        author: String(item.author || item.by || item.source || "").trim(),
        category: inferCategory(text, item.category || item.theme || fallbackCategory),
        note: String(item.note || item.personalNote || "").trim(),
        favorite: Boolean(item.favorite || item.isFavorite || item.saved),
        createdAt: item.createdAt || item.savedAt || item.date || new Date().toISOString()
      };
    }

    function extractQuotes(value, fallbackCategory = "Other", depth = 0) {
      if (depth > 5 || value == null) {
        return [];
      }

      if (typeof value === "string") {
        const parsedValue = safeParse(value);

        if (parsedValue !== value) {
          return extractQuotes(parsedValue, fallbackCategory, depth + 1);
        }

        const normalized = normalizeQuote(value, fallbackCategory);
        return normalized ? [normalized] : [];
      }

      if (Array.isArray(value)) {
        return value.flatMap((item) => {
          return extractQuotes(item, fallbackCategory, depth + 1);
        });
      }

      if (typeof value === "object") {
        const directQuote = normalizeQuote(value, fallbackCategory);

        if (directQuote) {
          return [directQuote];
        }

        return Object.entries(value).flatMap(([key, nestedValue]) => {
          const category = categoryInformation[key]
            ? key
            : fallbackCategory;

          return extractQuotes(nestedValue, category, depth + 1);
        });
      }

      return [];
    }

    function quoteSignature(quote) {
      return `${quote.text.trim().toLowerCase()}|${quote.author.trim().toLowerCase()}`;
    }

    function mergeQuotes(quotes) {
      const uniqueQuotes = new Map();

      quotes.forEach((quote) => {
        const normalized = normalizeQuote(quote, quote.category);
        if (!normalized) return;

        const signature = quoteSignature(normalized);
        const existing = uniqueQuotes.get(signature);

        if (!existing) {
          uniqueQuotes.set(signature, normalized);
          return;
        }

        uniqueQuotes.set(signature, {
          ...existing,
          favorite: existing.favorite || normalized.favorite,
          note: existing.note || normalized.note,
          category:
            existing.category !== "Other"
              ? existing.category
              : normalized.category,
          createdAt: existing.createdAt || normalized.createdAt
        });
      });

      return Array.from(uniqueQuotes.values()).sort((first, second) => {
        return new Date(second.createdAt) - new Date(first.createdAt);
      });
    }

    function collectAllSavedQuotes() {
      const collected = [];

      for (let index = 0; index < localStorage.length; index += 1) {
        const key = localStorage.key(index);
        if (!key || !key.toLowerCase().includes("quote")) continue;

        const storedValue = localStorage.getItem(key);
        if (!storedValue) continue;

        collected.push(...extractQuotes(storedValue));
      }

      const canonicalValue = localStorage.getItem(CANONICAL_STORAGE_KEY);
      if (canonicalValue) {
        collected.push(...extractQuotes(canonicalValue));
      }

      savedQuotes = mergeQuotes(collected);
      persistCanonicalQuotes();
      return savedQuotes;
    }

    function persistCanonicalQuotes() {
      try {
        localStorage.setItem(
          CANONICAL_STORAGE_KEY,
          JSON.stringify(savedQuotes)
        );
        return true;
      } catch (error) {
        console.error("Could not store saved quotes:", error);
        showToast("The saved quotes could not be stored");
        return false;
      }
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 2300);
    }

    function openModal() {
      modalOverlay.classList.add("open");
      modalOverlay.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function closeModal() {
      modalOverlay.classList.remove("open");
      modalOverlay.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
    }

    function openView(view) {
      currentView = view;
      collectAllSavedQuotes();
      openModal();

      if (view === "library") {
        modalLabel.textContent = "Your saved words";
        modalTitle.textContent = "Saved Quote Library";
        modalDescription.textContent = "Every quote the user saves in the app is stored here.";
        renderLibrary();
      }

      if (view === "collector") {
        modalLabel.textContent = "Automatic quote storage";
        modalTitle.textContent = "Quote Collector";
        modalDescription.textContent = "This collector organizes saved quotes. It does not create new quotes.";
        renderCollector();
      }

      if (view === "insights") {
        modalLabel.textContent = "Your inspiration patterns";
        modalTitle.textContent = "Quote Insights";
        modalDescription.textContent = "A meaningful overview of the words you save.";
        renderInsights();
      }
    }

    function createEmptyState() {
      return `
        <div class="empty-state">
          <div class="empty-icon">💬</div>
          <h3 class="empty-title">No saved quotes yet</h3>
          <p class="empty-text">
            Quotes saved elsewhere in Daily Mindset Builder will automatically appear here.
          </p>
        </div>
      `;
    }

    function createQuoteCards(quotes) {
      if (!quotes.length) return createEmptyState();

      return quotes.map((quote) => `
        <article class="quote-card">
          <button class="quote-card-button" type="button" data-copy-id="${escapeHTML(quote.id)}">
            <p class="quote-text">“${escapeHTML(quote.text)}”</p>
            <p class="quote-author">
              ${quote.author ? `— ${escapeHTML(quote.author)}` : "— Unknown author"}
            </p>
            <span class="quote-category">
              ${categoryInformation[quote.category] || "💭"}
              ${escapeHTML(quote.category || "Other")}
            </span>
          </button>

          <div class="quote-actions">
            <button
              class="quote-action favorite ${quote.favorite ? "active" : ""}"
              type="button"
              data-favorite-id="${escapeHTML(quote.id)}"
            >
              ${quote.favorite ? "★ Favorite" : "☆ Favorite"}
            </button>

            <button class="quote-action" type="button" data-copy-id="${escapeHTML(quote.id)}">Copy</button>
            <button class="quote-action delete" type="button" data-delete-id="${escapeHTML(quote.id)}">Delete</button>
          </div>
        </article>
      `).join("");
    }

    function renderLibrary(searchText = "") {
      const normalizedSearch = searchText.trim().toLowerCase();
      const matchingQuotes = savedQuotes.filter((quote) => {
        return [quote.text, quote.author, quote.category, quote.note]
          .join(" ")
          .toLowerCase()
          .includes(normalizedSearch);
      });

      modalContent.innerHTML = `
        <input
          class="search-box"
          id="quoteSearch"
          type="search"
          placeholder="Search all saved quotes..."
          value="${escapeHTML(searchText)}"
        >
        <div class="quote-list">${createQuoteCards(matchingQuotes)}</div>
      `;

      const searchInput = document.getElementById("quoteSearch");
      searchInput.addEventListener("input", (event) => {
        renderLibrary(event.target.value);
        const replacement = document.getElementById("quoteSearch");
        replacement.focus();
        replacement.setSelectionRange(replacement.value.length, replacement.value.length);
      });

      attachQuoteActions();
    }

    function renderCollector() {
      if (!savedQuotes.length) {
        modalContent.innerHTML = `
          <div class="collector-summary">
            <h3 class="collector-summary-title">Automatic quote collector</h3>
            <p class="collector-summary-text">
              This area stores only quotes the user has already saved in the app. No new quotes are added here.
            </p>
          </div>
          <div style="margin-top:14px">${createEmptyState()}</div>
        `;
        return;
      }

      const groupedQuotes = savedQuotes.reduce((groups, quote) => {
        const category = quote.category || "Other";
        if (!groups[category]) groups[category] = [];
        groups[category].push(quote);
        return groups;
      }, {});

      const collectionButtons = Object.entries(groupedQuotes)
        .sort((first, second) => second[1].length - first[1].length)
        .map(([category, quotes]) => `
          <button class="collection-button" type="button" data-category="${escapeHTML(category)}">
            <span class="collection-icon">${categoryInformation[category] || "💭"}</span>
            <span class="collection-name">${escapeHTML(category)}</span>
            <span class="collection-count">${quotes.length} ${quotes.length === 1 ? "quote" : "quotes"}</span>
          </button>
        `)
        .join("");

      modalContent.innerHTML = `
        <div class="collector-summary">
          <h3 class="collector-summary-title">${savedQuotes.length} saved ${savedQuotes.length === 1 ? "quote" : "quotes"}</h3>
          <p class="collector-summary-text">
            The collector automatically stores and organizes every quote the user saves across the app.
          </p>
        </div>

        <div class="collections-grid" style="margin-top:14px">
          ${collectionButtons}
        </div>
      `;

      document.querySelectorAll("[data-category]").forEach((button) => {
        button.addEventListener("click", () => {
          renderCategory(button.dataset.category);
        });
      });
    }

    function renderCategory(category) {
      const categoryQuotes = savedQuotes.filter((quote) => {
        return quote.category === category;
      });

      modalContent.innerHTML = `
        <button class="back-button" id="backToCollector" type="button">← Back to Quote Collector</button>
        <div class="quote-list">${createQuoteCards(categoryQuotes)}</div>
      `;

      document.getElementById("backToCollector").addEventListener("click", renderCollector);
      attachQuoteActions();
    }

    function renderInsights() {
      const favorites = savedQuotes.filter((quote) => quote.favorite).length;
      const categories = new Set(savedQuotes.map((quote) => quote.category)).size;
      const latest = savedQuotes[0];

      modalContent.innerHTML = `
        <div class="insights-grid">
          <div class="insight-card">
            <div class="insight-icon">💬</div>
            <div class="insight-number">${savedQuotes.length}</div>
            <div class="insight-label">Saved quotes</div>
          </div>

          <div class="insight-card">
            <div class="insight-icon">★</div>
            <div class="insight-number">${favorites}</div>
            <div class="insight-label">Favorites</div>
          </div>

          <div class="insight-card">
            <div class="insight-icon">🗂️</div>
            <div class="insight-number">${categories}</div>
            <div class="insight-label">Active themes</div>
          </div>

          <div class="insight-card">
            <div class="insight-icon">✨</div>
            <div class="insight-number">${latest ? 1 : 0}</div>
            <div class="insight-label">Latest inspiration</div>
          </div>
        </div>

        <div class="collector-summary" style="margin-top:14px">
          <h3 class="collector-summary-title">Your inspiration pattern</h3>
          <p class="collector-summary-text">
            ${savedQuotes.length
              ? "Your saved words are becoming a personal library of motivation, confidence and growth."
              : "Save meaningful quotes in the app to begin building your personal inspiration collection."}
          </p>
        </div>
      `;
    }

    function findQuoteById(quoteId) {
      return savedQuotes.find((quote) => quote.id === quoteId);
    }

    function toggleFavorite(quoteId) {
      const quote = findQuoteById(quoteId);
      if (!quote) return;

      quote.favorite = !quote.favorite;
      persistCanonicalQuotes();

      if (currentView === "collector") {
        renderCollector();
      } else {
        renderLibrary();
      }

      showToast(quote.favorite ? "Added to favorites ★" : "Removed from favorites");
    }

    async function copyQuote(quoteId) {
      const quote = findQuoteById(quoteId);
      if (!quote) return;

      const copyText = `“${quote.text}”${quote.author ? ` — ${quote.author}` : ""}`;

      try {
        await navigator.clipboard.writeText(copyText);
      } catch (error) {
        const temporaryTextarea = document.createElement("textarea");
        temporaryTextarea.value = copyText;
        document.body.appendChild(temporaryTextarea);
        temporaryTextarea.select();
        document.execCommand("copy");
        temporaryTextarea.remove();
      }

      showToast("Quote copied ✓");
    }

    function deleteQuote(quoteId) {
      if (!window.confirm("Delete this saved quote from the collector?")) return;

      savedQuotes = savedQuotes.filter((quote) => quote.id !== quoteId);
      persistCanonicalQuotes();

      if (currentView === "collector") {
        renderCollector();
      } else {
        renderLibrary();
      }

      showToast("Saved quote deleted");
    }

    function attachQuoteActions() {
      document.querySelectorAll("[data-favorite-id]").forEach((button) => {
        button.addEventListener("click", () => toggleFavorite(button.dataset.favoriteId));
      });

      document.querySelectorAll("[data-copy-id]").forEach((button) => {
        button.addEventListener("click", () => copyQuote(button.dataset.copyId));
      });

      document.querySelectorAll("[data-delete-id]").forEach((button) => {
        button.addEventListener("click", () => deleteQuote(button.dataset.deleteId));
      });
    }

    viewButtons.forEach((button) => {
      button.addEventListener("click", () => openView(button.dataset.view));
    });

    saveQuotesButton.addEventListener("click", () => {
      collectAllSavedQuotes();
      showToast(`${savedQuotes.length} saved ${savedQuotes.length === 1 ? "quote" : "quotes"} stored ✓`);
    });

    closeButton.addEventListener("click", closeModal);
    exitButton.addEventListener("click", closeModal);

    backToJournalButton.addEventListener("click", () => {
      window.location.href = "journal.html";
    });

    modalOverlay.addEventListener("click", (event) => {
      if (event.target === modalOverlay) closeModal();
    });

    quotesModal.addEventListener("click", (event) => event.stopPropagation());

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && modalOverlay.classList.contains("open")) {
        closeModal();
      }
    });

    window.addEventListener("storage", (event) => {
      if (event.key && event.key.toLowerCase().includes("quote")) {
        collectAllSavedQuotes();
      }
    });

    collectAllSavedQuotes();
  </script>

  <script src="performance.js"></script>
</body>
</html>
