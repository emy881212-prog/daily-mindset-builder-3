<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#020611"><title>Rocket Upgrades</title><link rel="stylesheet" href="rocket-upgrades-background.css"><style>
:root{color-scheme:dark;--p:#a43eff;--b:#020611;--c:#081225;--l:#293c60}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--b);color:#fff;font-family:Inter,system-ui,sans-serif;overflow-x:hidden}body{background:radial-gradient(circle at 30% 20%,#291050,transparent 30%),radial-gradient(#fff 1px,transparent 1.5px),#020611;background-size:auto,76px 76px;animation:stars 60s linear infinite}.shell{width:min(100%,1050px);margin:auto;padding:12px 16px 40px}.top{display:grid;grid-template-columns:48px 1fr auto;align-items:center;min-height:64px}.top button{border:0;background:none;color:#fff;font-size:28px}.top h1{font-size:20px}.balance{display:flex;gap:7px}.balance span{padding:8px;border:1px solid var(--l);border-radius:99px;background:#071020}.layout{display:grid;grid-template-columns:400px 1fr;gap:18px}.glass{border:1px solid var(--l);border-radius:22px;background:linear-gradient(145deg,#09152aee,#030916ee);box-shadow:0 18px 50px #0008}.preview{position:sticky;top:10px;height:max-content;padding:18px}.stage{position:relative;height:500px;display:grid;place-items:center;overflow:hidden;perspective:800px}.stage:before{content:"";position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(#8e35ff55,transparent 68%);animation:pulse 4s infinite}.stage img{z-index:2;width:240px;height:auto;max-height:430px;object-fit:contain;filter:drop-shadow(0 0 12px #55d8ff) drop-shadow(0 0 25px var(--glow,#a43eff));transform-origin:50% 58%;animation:float 4.4s cubic-bezier(.45,0,.55,1) infinite,rocketShine 2.8s ease-in-out infinite;transition:transform .35s,filter .35s;will-change:transform,filter}.stage:active img{transform:rotateY(14deg)}.flame{position:absolute;z-index:1;top:390px;width:44px;height:115px;border-radius:50%;background:linear-gradient(var(--trail,#a43eff),transparent);filter:blur(7px);animation:flame .25s alternate infinite}.stats{display:flex;justify-content:space-around;color:#aab6cc;font-size:12px}.stats b{display:block;color:#fff}.tabs{position:sticky;z-index:3;top:8px;display:flex;padding:6px;overflow:auto}.tabs button{flex:1;min-width:72px;min-height:60px;border:0;border-radius:14px;color:#7f8aa0;background:none;font-size:21px}.tabs small{display:block}.tabs .active{color:#e6a5ff;background:#28164a;box-shadow:0 0 16px #9d3cff77}.items{display:grid;gap:10px;margin-top:13px}.item{display:grid;grid-template-columns:55px 1fr auto;gap:11px;align-items:center;padding:13px;border:1px solid var(--l);border-radius:16px;background:#071124ee;animation:up .3s both}.item.equipped{border-color:#aa4cff;box-shadow:0 0 17px #9c3cff44}.ico{display:grid;width:53px;height:53px;place-items:center;border-radius:14px;background:#26134b;font-size:29px}.item h2{margin:0;font-size:14px}.item p{margin:4px 0;color:#aab6cc;font-size:11px}.item em{color:#ce6dff;font-size:10px}.item button,.primary{min-height:42px;border:1px solid #8135d2;border-radius:10px;color:#fff;background:linear-gradient(90deg,#6121d8,#9d36ef);font-weight:700}.item button:disabled{background:#162137;color:#99a4b7;border-color:#2b3a55}.modal{position:fixed;z-index:20;inset:0;display:grid;place-items:center;padding:17px;background:#000b;opacity:0;pointer-events:none;transition:.25s}.modal.show{opacity:1;pointer-events:auto}.modal section{width:min(100%,370px);padding:24px;text-align:center;transform:scale(.92);transition:.25s}.modal.show section{transform:none}.modal-actions{display:grid;grid-template-columns:1fr 1.3fr;gap:8px}.modal-actions button{min-height:46px;border:1px solid #634188;border-radius:10px;color:#fff;background:#111a2b}.success{position:fixed;z-index:30;top:18px;left:50%;transform:translate(-50%,-90px);padding:13px 18px;border:1px solid #ad4dff;border-radius:99px;background:#1b1034;transition:.35s}.success.show{transform:translate(-50%,0)}@keyframes stars{to{background-position:0 600px}}@keyframes float{0%,100%{transform:translate3d(0,3px,0) rotate(-.8deg)}50%{transform:translate3d(0,-14px,0) rotate(1.2deg)}}@keyframes rocketShine{0%,100%{filter:drop-shadow(0 0 10px #55d8ff) drop-shadow(0 7px 22px var(--glow,#a43eff))}50%{filter:drop-shadow(0 0 18px #8cecff) drop-shadow(0 10px 38px var(--glow,#a43eff))}}@keyframes flame{to{height:130px;opacity:.7}}@keyframes pulse{50%{transform:scale(1.12)}}@keyframes up{from{opacity:0;transform:translateY(8px)}}@media(max-width:720px){.layout{display:block}.preview{position:relative}.stage{height:350px}.stage img{width:180px;max-height:320px}.flame{top:275px;height:80px}.shop{margin-top:14px}.tabs{top:63px}.item{grid-template-columns:48px 1fr auto}.top h1{font-size:16px}.balance span{font-size:10px;padding:7px}}@media(max-width:350px){.shell{padding-inline:9px}.item{grid-template-columns:48px 1fr}.item>button{grid-column:1/-1;width:100%}}@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>  <link rel="stylesheet" href="performance.css">
</head><body><main class="shell"><header class="top"><button id="back">←</button><h1>Rocket Upgrades</h1><div class="balance"><span>⛽ <b id="fuel"></b></span><span>💎 <b id="diamonds"></b></span></div></header><div class="layout"><section class="preview glass"><small>STARLIGHT HANGAR</small><div class="stage" id="stage" tabindex="0"><img id="rocket" src="rocket-realistic.webp" width="823" height="1100" alt="Customized realistic silver and purple rocket"><i class="flame"></i></div><div class="stats"><span>Efficiency<b id="eff">+10%</b></span><span>Class<b>Explorer</b></span><span>Power<b id="power">120</b></span></div></section><section class="shop"><nav class="tabs glass" id="tabs"><button class="active" data-c="engine">🚀<small>Engine</small></button><button data-c="wings">△<small>Wings</small></button><button data-c="window">◉<small>Window</small></button><button data-c="trail">⌁<small>Trail</small></button><button data-c="color">◐<small>Color</small></button></nav><div class="items" id="items"></div></section></div></main><div class="modal" id="modal" aria-hidden="true"><section class="glass" role="dialog" aria-modal="true"><div id="mIcon" style="font-size:60px"></div><h2 id="mTitle"></h2><p id="mText"></p><p>Price: <b id="mPrice"></b> · Balance: <b id="mBalance"></b></p><div class="modal-actions"><button id="cancel">Cancel</button><button class="primary" id="confirm">Confirm Upgrade</button></div></section></div><div class="success" id="success">✨ Rocket upgrade unlocked! ✨</div><script>
(()=>{const C={engine:[["bronze","Bronze Engine","+10% efficiency",0,"🥉"],["silver","Silver Engine","+20% efficiency",150,"🥈"],["gold","Gold Engine","+35% efficiency",500,"🥇"],["diamond","Diamond Engine","+50% efficiency",1000,"💎"]],wings:[["explorer","Explorer Wings","Stable control",0,"△"],["lunar","Lunar Wings","Moon maneuvering",220,"🌙"],["galaxy","Galaxy Wings","Advanced handling",550,"✨"],["cosmic","Cosmic Wings","Premium handling",900,"🌌"]],window:[["blue","Classic Blue","Blue glow",0,"🔵"],["purple","Purple Nebula","Violet glow",180,"🟣"],["gold","Golden Star","Golden glow",420,"🟡"],["cosmic","Diamond Cosmic","Prismatic glow",800,"💎"]],trail:[["purple","Purple Flame","Violet trail",0,"♨"],["blue","Blue Plasma","Plasma trail",200,"💠"],["gold","Golden Stars","Star trail",400,"⭐"],["rainbow","Rainbow Galaxy","Galaxy trail",650,"🌈"],["comet","Diamond Comet","Comet trail",950,"☄"]],color:[["purple","Starlight Purple","Royal finish",0,"🟣"],["blue","Cosmic Blue","Deep blue finish",120,"🔵"],["silver","Lunar Silver","Silver finish",180,"⚪"],["gold","Solar Gold","Gold finish",350,"🟡"],["pink","Nebula Pink","Pink finish",350,"🌸"],["black","Galaxy Black","Dark finish",500,"⚫"]]};const K="lifeRocketCustomizationV1",D={owned:{engine:["bronze"],wings:["explorer"],window:["blue"],trail:["purple"],color:["purple"]},equipped:{engine:"bronze",wings:"explorer",window:"blue",trail:"purple",color:"purple"}};let S;try{S=JSON.parse(localStorage.getItem(K))||structuredClone(D)}catch{S=structuredClone(D)}let fuel=+localStorage.getItem("lifeRocketFuel")||720,diamonds=+localStorage.getItem("lifeRocketDiamonds")||0,cat="engine",pending,busy=false,$=s=>document.querySelector(s);function save(){localStorage.setItem(K,JSON.stringify(S));localStorage.setItem("lifeRocketFuel",fuel);$("#fuel").textContent=fuel;$("#diamonds").textContent=diamonds;preview()}function preview(){let e=S.equipped,color={purple:0,blue:45,silver:-25,gold:290,pink:330,black:85}[e.color],glow={purple:"#a43eff",blue:"#398aff",silver:"#dcecff",gold:"#ffbd42",pink:"#ff55b8",black:"#66698d"}[e.color];$("#rocket").style.filter=`hue-rotate(${color}deg) drop-shadow(0 0 24px ${glow})`;document.documentElement.style.setProperty("--trail",{purple:"#a43eff",blue:"#36bfff",gold:"#ffc43c",rainbow:"#ff5fce",comet:"#ddfaff"}[e.trail]);$("#eff").textContent=C.engine.find(x=>x[0]===e.engine)[2].split(" ")[0];$("#power").textContent=110+C.engine.findIndex(x=>x[0]===e.engine)*20}function render(){$("#items").innerHTML=C[cat].map((x,i)=>{let owned=S.owned[cat].includes(x[0]),eq=S.equipped[cat]===x[0],premium=i===C[cat].length-1&&x[3]>700;return `<article class="item ${eq?"equipped":""}"><div class="ico">${x[4]}</div><div><h2>${x[1]}</h2><p>${x[2]}</p><em>${eq?"● Equipped":owned?"Owned":premium?"◆ Premium":`⛽ ${x[3]}`}</em></div><button data-id="${x[0]}" ${eq?"disabled":""}>${eq?"✓ Equipped":owned?"Equip":fuel>=x[3]?"Upgrade":"Need Fuel"}</button></article>`}).join("");document.querySelectorAll(".item button").forEach(b=>b.onclick=()=>act(b.dataset.id))}function act(id){let x=C[cat].find(y=>y[0]===id);if(S.owned[cat].includes(id)){S.equipped[cat]=id;save();render();return}if(fuel<x[3]){toast("Not enough fuel");return}pending=[cat,x];$("#mIcon").textContent=x[4];$("#mTitle").textContent=x[1];$("#mText").textContent=x[2];$("#mPrice").textContent="⛽ "+x[3];$("#mBalance").textContent="⛽ "+fuel;$("#modal").classList.add("show");document.body.style.overflow="hidden"}function close(){$("#modal").classList.remove("show");document.body.style.overflow="";pending=null}function toast(t="Rocket upgrade unlocked!"){$("#success").textContent="✨ "+t+" ✨";$("#success").classList.add("show");setTimeout(()=>$("#success").classList.remove("show"),2200)}document.querySelectorAll("#tabs button").forEach(b=>b.onclick=()=>{cat=b.dataset.c;document.querySelectorAll("#tabs button").forEach(x=>x.classList.toggle("active",x===b));render()});$("#confirm").onclick=()=>{if(!pending||busy)return;busy=true;let[c,x]=pending;if(!S.owned[c].includes(x[0])&&fuel>=x[3]){fuel-=x[3];S.owned[c].push(x[0]);S.equipped[c]=x[0];save();render();toast()}busy=false;close()};$("#cancel").onclick=close;$("#modal").onclick=e=>{if(e.target.id==="modal")close()};$("#back").onclick=()=>location.href="life-rocket.html";$("#stage").onclick=()=>$("#rocket").style.transform=$("#rocket").style.transform?"":"rotateY(14deg) rotateZ(2deg)";save();render()})();
</script>  <script src="performance.js"></script>
</body></html>
