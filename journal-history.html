<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >

  <title>Journal History</title>

  <link rel="stylesheet" href="performance.css">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --background-top: #f7f5f6;
      --background-bottom: #817e8c;

      --panel-light: #ead8da;
      --panel-dark: #c5adb0;

      --button-light: #efb5aa;
      --button-middle: #d9a099;
      --button-dark: #ae8985;

      --accent-light: #efb8ae;
      --accent: #bd7f7a;
      --accent-dark: #8e6463;

      --dark: #151416;
      --soft-dark: #41353a;
      --white: #ffffff;
    }

    html {
      min-height: 100%;
      background: var(--background-bottom);
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;

      overflow-x: hidden;

      color: var(--dark);

      font-family:
        Inter,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;

      background:
        radial-gradient(
          circle at 25% 8%,
          rgba(255, 255, 255, 0.85),
          transparent 30%
        ),
        linear-gradient(
          180deg,
          var(--background-top) 0%,
          #ddd9df 39%,
          var(--background-bottom) 100%
        );
    }

    button {
      border: 0;
      font: inherit;
      cursor: pointer;
      touch-action: manipulation;
    }

    /* ==================================
       ANIMATED BACKGROUND BUBBLES
    ================================== */

    .bubbles {
      position: fixed;
      inset: 0;
      z-index: 0;

      overflow: hidden;
      pointer-events: none;
    }

    .bubble {
      position: absolute;
      bottom: -55px;

      width: var(--size);
      height: var(--size);

      border: 1px solid rgba(255, 255, 255, 0.45);
      border-radius: 50%;

      background: rgba(255, 255, 255, 0.11);

      box-shadow:
        inset 0 0 12px rgba(255, 255, 255, 0.28),
        0 4px 17px rgba(255, 255, 255, 0.08);

      animation: rise var(--duration) linear infinite;
      animation-delay: var(--delay);
    }

    .bubble:nth-child(1) {
      left: 7%;
      --size: 18px;
      --duration: 17s;
      --delay: -4s;
    }

    .bubble:nth-child(2) {
      left: 24%;
      --size: 11px;
      --duration: 14s;
      --delay: -9s;
    }

    .bubble:nth-child(3) {
      left: 43%;
      --size: 25px;
      --duration: 21s;
      --delay: -13s;
    }

    .bubble:nth-child(4) {
      left: 63%;
      --size: 15px;
      --duration: 16s;
      --delay: -6s;
    }

    .bubble:nth-child(5) {
      left: 79%;
      --size: 21px;
      --duration: 19s;
      --delay: -11s;
    }

    .bubble:nth-child(6) {
      left: 92%;
      --size: 12px;
      --duration: 15s;
      --delay: -7s;
    }

    @keyframes rise {
      0% {
        transform: translate3d(0, 0, 0);
        opacity: 0;
      }

      12% {
        opacity: 0.7;
      }

      50% {
        transform: translate3d(11px, -55vh, 0);
      }

      100% {
        transform: translate3d(-8px, -115vh, 0);
        opacity: 0;
      }
    }

    /* ==================================
       MAIN APP
    ================================== */

    .app {
      position: relative;
      z-index: 1;

      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      min-height: 100dvh;

      margin: 0 auto;

      padding:
        max(12px, env(safe-area-inset-top))
        20px
        max(24px, env(safe-area-inset-bottom));
    }

    /* ==================================
       HEADER
    ================================== */

    .header {
      display: flex;
      align-items: center;
      gap: 12px;

      margin-bottom: 10px;
    }

    .logo-button {
      display: grid;
      place-items: center;

      width: 55px;
      min-width: 55px;
      height: 55px;

      border: 10px solid rgba(255, 255, 255, 0.94);
      border-radius: 50%;

      color: white;
      background: #17181c;

      box-shadow:
        0 3px 8px rgba(0, 0, 0, 0.18),
        inset 0 0 0 1px rgba(255, 255, 255, 0.06);
    }

    .logo-symbol {
      font-size: 25px;
      line-height: 1;
      pointer-events: none;
    }

    .brand-name {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 16px;
      font-weight: 500;
    }

    /* ==================================
       TITLE
    ================================== */

    .title-wrapper {
      display: flex;
      justify-content: center;

      width: 100%;
      margin: 0 auto 12px;
    }

    .title-box {
      width: fit-content;
      max-width: 95%;

      padding: 8px 27px;

      text-align: center;

      background: rgba(255, 255, 255, 0.7);

      box-shadow:
        0 7px 22px rgba(77, 70, 77, 0.06);
    }

    .page-title {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(31px, 8.7vw, 39px);
      font-weight: 500;
      line-height: 1;
      letter-spacing: -1.3px;
    }

    .page-subtitle {
      margin-top: 6px;

      font-family: Georgia, "Times New Roman", serif;
      font-size: 13px;

      color: rgba(43, 37, 40, 0.58);
    }

    /* ==================================
       HISTORY PANEL
    ================================== */

    .history-panel {
      min-height: 682px;

      padding: 78px 14px 43px;

      border: 2px solid rgba(177, 112, 112, 0.5);
      border-radius: 66px;

      background:
        radial-gradient(
          circle at 50% 7%,
          rgba(255, 255, 255, 0.23),
          transparent 34%
        ),
        linear-gradient(
          145deg,
          var(--panel-light),
          var(--panel-dark)
        );

      box-shadow:
        0 13px 23px rgba(45, 38, 48, 0.29),
        inset 5px 5px 14px rgba(255, 255, 255, 0.23),
        inset -7px -7px 15px rgba(104, 75, 84, 0.15);
    }

    .history-buttons {
      display: flex;
      flex-direction: column;
      gap: 36px;
    }

    .history-button {
      position: relative;

      display: flex;
      align-items: center;
      justify-content: center;

      width: 100%;
      min-height: 132px;

      padding: 18px 29px;

      border: 1.5px solid #171517;
      border-radius: 999px;

      color: var(--dark);

      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(21px, 5.7vw, 26px);
      line-height: 1.18;
      text-align: center;

      background:
        linear-gradient(
          100deg,
          var(--button-light) 0%,
          var(--button-middle) 52%,
          var(--button-dark) 100%
        );

      box-shadow:
        0 12px 10px rgba(61, 49, 57, 0.37),
        inset 3px 3px 5px rgba(255, 255, 255, 0.32),
        inset -4px -4px 8px rgba(83, 56, 57, 0.18);

      transition:
        transform 160ms ease,
        box-shadow 160ms ease,
        filter 160ms ease;
    }

    .history-button:hover {
      filter: brightness(1.035);
    }

    .history-button:active {
      transform: translateY(4px) scale(0.986);

      box-shadow:
        0 6px 7px rgba(61, 49, 57, 0.31),
        inset 2px 2px 5px rgba(90, 59, 63, 0.14);
    }

    .button-content,
    .button-icon,
    .button-label,
    .button-description {
      pointer-events: none;
    }

    .button-content {
      display: block;
      max-width: 260px;
    }

    .button-icon {
      display: block;

      margin-bottom: 6px;

      font-size: 29px;
    }

    .button-label {
      display: block;
    }

    .button-description {
      display: block;

      margin-top: 5px;

      font-family:
        Inter,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;

      font-size: 11px;
      line-height: 1.35;

      color: rgba(51, 40, 45, 0.62);
    }

    /* ==================================
       REFRESH BUTTON
    ================================== */

    .refresh-button {
      display: block;

      width: 73%;
      min-height: 56px;

      margin: 21px auto 0;

      border: 1.5px solid var(--dark);
      border-radius: 999px;

      color: var(--dark);
      background: #e1e1e1;

      font-family: Georgia, "Times New Roman", serif;
      font-size: 25px;
      font-weight: 700;
      letter-spacing: -0.7px;

      box-shadow:
        0 7px 8px rgba(34, 30, 38, 0.35),
        inset 2px 2px 4px rgba(255, 255, 255, 0.78);

      transition:
        transform 160ms ease,
        box-shadow 160ms ease;
    }

    .refresh-button:active {
      transform: translateY(3px);
    }

    /* ==================================
       POP-UP OVERLAY
    ================================== */

    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;

      display: flex;
      align-items: flex-end;
      justify-content: center;

      padding: 13px;

      visibility: hidden;
      opacity: 0;

      background: rgba(27, 22, 29, 0.56);

      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);

      transition:
        opacity 230ms ease,
        visibility 230ms ease;
    }

    .modal-overlay.open {
      visibility: visible;
      opacity: 1;
    }

    /* ==================================
       MODERN HISTORY WINDOW
    ================================== */

    .history-modal {
      width: 100%;
      max-width: 430px;

      max-height: calc(100vh - 26px);
      max-height: calc(100dvh - 26px);

      overflow-y: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;

      padding:
        17px
        17px
        max(23px, env(safe-area-inset-bottom));

      border: 1px solid rgba(255, 255, 255, 0.82);
      border-radius: 35px 35px 28px 28px;

      background:
        radial-gradient(
          circle at 10% 3%,
          rgba(255, 255, 255, 0.98),
          transparent 27%
        ),
        linear-gradient(
          150deg,
          rgba(255, 250, 250, 0.99),
          rgba(232, 205, 208, 0.99)
        );

      box-shadow:
        0 -13px 45px rgba(26, 21, 28, 0.36),
        inset 0 1px 0 rgba(255, 255, 255, 0.95);

      transform: translate3d(0, 105%, 0);

      transition:
        transform 300ms cubic-bezier(0.22, 0.82, 0.32, 1);
    }

    .modal-overlay.open .history-modal {
      transform: translate3d(0, 0, 0);
    }

    .modal-handle {
      width: 53px;
      height: 5px;

      margin: 0 auto 17px;

      border-radius: 999px;

      background: rgba(61, 47, 53, 0.23);
    }

    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 15px;
    }

    .modal-label {
      margin-bottom: 4px;

      font-size: 11px;
      font-weight: 800;
      letter-spacing: 1.6px;
      text-transform: uppercase;

      color: var(--accent-dark);
    }

    .modal-title {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 30px;
      font-weight: 500;
      line-height: 1.06;
      letter-spacing: -1px;
    }

    .modal-description {
      margin-top: 6px;

      font-size: 12px;
      line-height: 1.45;

      color: rgba(51, 41, 46, 0.58);
    }

    .close-button {
      display: grid;
      place-items: center;

      width: 42px;
      min-width: 42px;
      height: 42px;

      border: 1px solid rgba(76, 55, 62, 0.18);
      border-radius: 50%;

      font-size: 23px;

      color: var(--soft-dark);
      background: rgba(255, 255, 255, 0.65);

      box-shadow:
        0 5px 13px rgba(72, 52, 60, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.91);
    }

    .modal-content {
      margin-top: 20px;
    }

    /* ==================================
       CALENDAR
    ================================== */

    .calendar-card {
      padding: 16px;

      border: 1px solid rgba(124, 86, 93, 0.14);
      border-radius: 26px;

      background: rgba(255, 255, 255, 0.56);

      box-shadow:
        0 9px 25px rgba(108, 73, 81, 0.09),
        inset 0 1px 0 rgba(255, 255, 255, 0.87);
    }

    .calendar-navigation {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;

      margin-bottom: 15px;
    }

    .calendar-navigation-button {
      display: grid;
      place-items: center;

      width: 39px;
      height: 39px;

      border: 1px solid rgba(103, 72, 79, 0.17);
      border-radius: 50%;

      color: #3e3237;
      background: rgba(255, 255, 255, 0.77);

      font-size: 21px;
      font-weight: 700;

      box-shadow:
        0 4px 10px rgba(75, 51, 59, 0.1);
    }

    .calendar-month {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 21px;
      font-weight: 600;
      text-align: center;
    }

    .calendar-weekdays,
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }

    .calendar-weekdays {
      margin-bottom: 7px;
    }

    .weekday {
      padding: 4px 0;

      font-size: 10px;
      font-weight: 800;
      text-align: center;
      text-transform: uppercase;

      color: rgba(64, 49, 56, 0.5);
    }

    .calendar-day {
      position: relative;

      display: grid;
      place-items: center;

      min-height: 39px;

      border: 1px solid transparent;
      border-radius: 13px;

      color: #40343a;
      background: rgba(255, 255, 255, 0.5);

      font-size: 13px;
      font-weight: 700;

      transition:
        transform 150ms ease,
        background 150ms ease,
        border-color 150ms ease;
    }

    .calendar-day:not(.empty):active {
      transform: scale(0.93);
    }

    .calendar-day.empty {
      opacity: 0;
      cursor: default;
      pointer-events: none;
    }

    .calendar-day.today {
      border-color: rgba(137, 91, 94, 0.55);
    }

    .calendar-day.highlighted {
      color: white;

      background:
        linear-gradient(
          145deg,
          #d8958d,
          #946968
        );

      box-shadow:
        0 5px 10px rgba(103, 65, 73, 0.2);
    }

    .calendar-day.selected {
      outline: 3px solid rgba(214, 154, 149, 0.25);
      outline-offset: 2px;
    }

    .calendar-dot {
      position: absolute;
      bottom: 4px;

      width: 4px;
      height: 4px;

      border-radius: 50%;

      background: currentColor;
    }

    .calendar-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 9px 15px;

      margin-top: 14px;
      padding-top: 13px;

      border-top: 1px solid rgba(103, 73, 80, 0.11);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;

      font-size: 11px;

      color: rgba(55, 43, 49, 0.64);
    }

    .legend-color {
      width: 11px;
      height: 11px;

      border-radius: 4px;

      background:
        linear-gradient(
          145deg,
          #d8958d,
          #946968
        );
    }

    .legend-outline {
      width: 11px;
      height: 11px;

      border: 1px solid rgba(137, 91, 94, 0.65);
      border-radius: 4px;

      background: white;
    }

    .day-details {
      margin-top: 15px;
      padding: 15px;

      border-radius: 20px;

      background: rgba(255, 255, 255, 0.64);
    }

    .day-details-title {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 18px;
      font-weight: 600;
    }

    .day-details-text {
      margin-top: 7px;

      font-size: 12px;
      line-height: 1.5;

      color: rgba(56, 44, 50, 0.66);
    }

    .day-entry {
      margin-top: 10px;
      padding: 11px 12px;

      border-radius: 15px;

      background: rgba(235, 207, 209, 0.57);
    }

    .day-entry-title {
      font-size: 13px;
      font-weight: 800;
    }

    .day-entry-summary {
      margin-top: 4px;

      font-size: 11px;
      line-height: 1.45;

      color: rgba(59, 45, 51, 0.65);
    }

    /* ==================================
       TIMELINE
    ================================== */

    .timeline-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .timeline-entry {
      width: 100%;
      padding: 15px;

      border: 1px solid rgba(116, 79, 87, 0.14);
      border-radius: 21px;

      color: var(--dark);
      background: rgba(255, 255, 255, 0.58);

      text-align: left;

      box-shadow:
        0 7px 19px rgba(93, 62, 70, 0.08);

      transition:
        transform 160ms ease,
        background 160ms ease;
    }

    .timeline-entry:active {
      transform: scale(0.985);
    }

    .timeline-entry-header {
      display: flex;
      align-items: center;
      gap: 11px;

      pointer-events: none;
    }

    .timeline-icon {
      display: grid;
      place-items: center;

      width: 43px;
      min-width: 43px;
      height: 43px;

      border-radius: 15px;

      font-size: 22px;

      background:
        linear-gradient(
          145deg,
          #f1bdb5,
          #bd8a87
        );
    }

    .timeline-information {
      flex: 1;
      pointer-events: none;
    }

    .timeline-title {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 17px;
      font-weight: 600;
    }

    .timeline-date {
      margin-top: 3px;

      font-size: 10px;
      color: rgba(61, 47, 53, 0.5);
    }

    .timeline-summary {
      margin-top: 11px;

      font-size: 12px;
      line-height: 1.5;

      color: rgba(57, 44, 50, 0.67);

      pointer-events: none;
    }

    .timeline-details {
      display: none;

      margin-top: 12px;
      padding-top: 12px;

      border-top: 1px solid rgba(104, 73, 81, 0.12);

      font-size: 12px;
      line-height: 1.55;

      color: rgba(56, 43, 49, 0.75);

      white-space: pre-wrap;
      pointer-events: none;
    }

    .timeline-entry.expanded .timeline-details {
      display: block;
    }

    .timeline-hint {
      margin-top: 8px;

      font-size: 10px;
      font-weight: 700;

      color: var(--accent-dark);
      pointer-events: none;
    }

    /* ==================================
       MONTHLY INSIGHTS
    ================================== */

    .insights-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 11px;
    }

    .insight-card {
      padding: 16px 12px;

      border: 1px solid rgba(114, 77, 85, 0.13);
      border-radius: 21px;

      text-align: center;

      background: rgba(255, 255, 255, 0.58);

      box-shadow:
        0 7px 19px rgba(93, 62, 70, 0.07);
    }

    .insight-icon {
      font-size: 25px;
    }

    .insight-number {
      margin-top: 7px;

      font-family: Georgia, "Times New Roman", serif;
      font-size: 27px;
      font-weight: 700;
    }

    .insight-label {
      margin-top: 3px;

      font-size: 10px;
      font-weight: 700;
      line-height: 1.35;

      color: rgba(58, 44, 50, 0.58);
    }

    .insight-message {
      margin-top: 14px;
      padding: 17px;

      border-radius: 22px;

      background:
        linear-gradient(
          145deg,
          rgba(243, 203, 198, 0.7),
          rgba(207, 166, 168, 0.58)
        );

      box-shadow:
        0 7px 19px rgba(94, 62, 70, 0.08);
    }

    .insight-message-title {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 19px;
      font-weight: 600;
    }

    .insight-message-text {
      margin-top: 7px;

      font-size: 12px;
      line-height: 1.55;

      color: rgba(58, 45, 51, 0.69);
    }

    .category-progress {
      margin-top: 14px;
      padding: 16px;

      border-radius: 22px;

      background: rgba(255, 255, 255, 0.58);
    }

    .progress-title {
      margin-bottom: 13px;

      font-family: Georgia, "Times New Roman", serif;
      font-size: 18px;
      font-weight: 600;
    }

    .progress-row {
      margin-top: 11px;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      gap: 10px;

      margin-bottom: 6px;

      font-size: 11px;
      font-weight: 700;

      color: rgba(55, 43, 49, 0.66);
    }

    .progress-track {
      height: 8px;

      overflow: hidden;

      border-radius: 999px;

      background: rgba(111, 82, 89, 0.12);
    }

    .progress-fill {
      height: 100%;

      border-radius: inherit;

      background:
        linear-gradient(
          90deg,
          #df9f96,
          #956b69
        );
    }

    /* ==================================
       EMPTY STATE
    ================================== */

    .empty-state {
      padding: 29px 20px;

      border: 1px solid rgba(116, 79, 87, 0.13);
      border-radius: 24px;

      text-align: center;

      background: rgba(255, 255, 255, 0.57);
    }

    .empty-icon {
      font-size: 37px;
    }

    .empty-title {
      margin-top: 10px;

      font-family: Georgia, "Times New Roman", serif;
      font-size: 21px;
      font-weight: 600;
    }

    .empty-text {
      margin-top: 7px;

      font-size: 12px;
      line-height: 1.5;

      color: rgba(58, 45, 51, 0.62);
    }

    /* ==================================
       EXIT BUTTON
    ================================== */

    .modal-actions {
      margin-top: 19px;
    }

    .exit-button {
      width: 100%;
      min-height: 54px;

      border: 1px solid rgba(67, 50, 56, 0.21);
      border-radius: 999px;

      color: #46383d;
      background: rgba(255, 255, 255, 0.69);

      font-size: 15px;
      font-weight: 800;

      box-shadow:
        0 5px 12px rgba(63, 45, 52, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.88);

      transition: transform 160ms ease;
    }

    .exit-button:active {
      transform: translateY(2px) scale(0.985);
    }

    /* ==================================
       TOAST
    ================================== */

    .toast {
      position: fixed;
      left: 50%;
      bottom: max(25px, env(safe-area-inset-bottom));
      z-index: 2000;

      width: max-content;
      max-width: calc(100% - 34px);

      padding: 13px 20px;

      border: 1px solid rgba(255, 255, 255, 0.23);
      border-radius: 999px;

      color: white;
      background: rgba(32, 27, 33, 0.92);

      font-size: 14px;
      font-weight: 700;
      text-align: center;

      box-shadow:
        0 10px 30px rgba(21, 17, 22, 0.3);

      opacity: 0;
      pointer-events: none;

      transform: translate(-50%, 24px);

      transition:
        opacity 220ms ease,
        transform 220ms ease;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    button:focus-visible {
      outline: 3px solid rgba(255, 255, 255, 0.95);
      outline-offset: 3px;
    }

    @media (max-width: 370px) {
      .app {
        padding-left: 14px;
        padding-right: 14px;
      }

      .history-panel {
        min-height: 640px;
        padding-left: 11px;
        padding-right: 11px;
        border-radius: 57px;
      }

      .history-button {
        min-height: 124px;
        font-size: 20px;
      }

      .calendar-weekdays,
      .calendar-grid {
        gap: 4px;
      }

      .calendar-day {
        min-height: 35px;
      }
    }

    @media (min-width: 600px) {
      .modal-overlay {
        align-items: center;
      }

      .history-modal {
        border-radius: 35px;

        transform:
          translate3d(0, 25px, 0)
          scale(0.97);
      }

      .modal-overlay.open .history-modal {
        transform:
          translate3d(0, 0, 0)
          scale(1);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

<body>

  <div class="bubbles" aria-hidden="true">
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>
  </div>

  <main class="app">

    <header class="header">

      <button
        class="logo-button"
        id="backToJournalButton"
        type="button"
        aria-label="Return to journal menu"
      >
        <span class="logo-symbol">✦</span>
      </button>

      <p class="brand-name">
        Daily Mindset Builder
      </p>

    </header>

    <div class="title-wrapper">

      <div class="title-box">

        <h1 class="page-title">
          Journal History
        </h1>

        <p class="page-subtitle">
          Discover the story behind your growth
        </p>

      </div>

    </div>

    <section class="history-panel">

      <div class="history-buttons">

        <button
          class="history-button"
          type="button"
          data-view="calendar"
        >
          <span class="button-content">

            <span class="button-icon">📅</span>

            <span class="button-label">
              Calendar Highlights
            </span>

            <span class="button-description">
              See your active days and memorable entries
            </span>

          </span>
        </button>

        <button
          class="history-button"
          type="button"
          data-view="timeline"
        >
          <span class="button-content">

            <span class="button-icon">🕰️</span>

            <span class="button-label">
              Reflection Timeline
            </span>

            <span class="button-description">
              Revisit your moods, gratitude and reflections
            </span>

          </span>
        </button>

        <button
          class="history-button"
          type="button"
          data-view="insights"
        >
          <span class="button-content">

            <span class="button-icon">✨</span>

            <span class="button-label">
              Monthly Insights
            </span>

            <span class="button-description">
              View your activity, words and personal patterns
            </span>

          </span>
        </button>

      </div>

    </section>

    <button
      class="refresh-button"
      id="refreshHistoryButton"
      type="button"
    >
      REFRESH
    </button>

  </main>

  <!-- History window -->

  <div
    class="modal-overlay"
    id="modalOverlay"
    aria-hidden="true"
  >

    <section
      class="history-modal"
      id="historyModal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modalTitle"
    >

      <div class="modal-handle"></div>

      <div class="modal-header">

        <div>

          <p
            class="modal-label"
            id="modalLabel"
          >
            Journal history
          </p>

          <h2
            class="modal-title"
            id="modalTitle"
          >
            Calendar Highlights
          </h2>

          <p
            class="modal-description"
            id="modalDescription"
          >
            Highlighted dates contain saved journal activity.
          </p>

        </div>

        <button
          class="close-button"
          id="closeButton"
          type="button"
          aria-label="Exit history window"
        >
          ×
        </button>

      </div>

      <div
        class="modal-content"
        id="modalContent"
      ></div>

      <div class="modal-actions">

        <button
          class="exit-button"
          id="exitButton"
          type="button"
        >
          Exit
        </button>

      </div>

    </section>

  </div>

  <div
    class="toast"
    id="toast"
    role="status"
    aria-live="polite"
  >
    History refreshed ✓
  </div>

  <script>
    const HISTORY_STORAGE_KEY =
      "dailyMindsetJournalHistory";

    const STORAGE_SOURCES = [
      {
        key: "dailyMindsetJournalEntry",
        type: "mood",
        title: "Mood Tracker",
        icon: "😊"
      },
      {
        key: "dailyMindsetGratitudeJournal",
        type: "gratitude",
        title: "Gratitude Journal",
        icon: "🤍"
      },
      {
        key: "dailyMindsetGoalsAndDreams",
        type: "goals",
        title: "Goals & Dreams",
        icon: "🎯"
      },
      {
        key: "dailyMindsetDailyReflection",
        type: "reflection",
        title: "Daily Reflection",
        icon: "🪞"
      }
    ];

    const modalOverlay =
      document.getElementById("modalOverlay");

    const historyModal =
      document.getElementById("historyModal");

    const modalLabel =
      document.getElementById("modalLabel");

    const modalTitle =
      document.getElementById("modalTitle");

    const modalDescription =
      document.getElementById("modalDescription");

    const modalContent =
      document.getElementById("modalContent");

    const closeButton =
      document.getElementById("closeButton");

    const exitButton =
      document.getElementById("exitButton");

    const refreshHistoryButton =
      document.getElementById("refreshHistoryButton");

    const backToJournalButton =
      document.getElementById("backToJournalButton");

    const historyButtons =
      document.querySelectorAll(".history-button");

    const toast =
      document.getElementById("toast");

    let journalHistory = [];
    let currentView = "calendar";

    let calendarDate = new Date(
      new Date().getFullYear(),
      new Date().getMonth(),
      1
    );

    let toastTimer;

    function readJSON(key, fallbackValue) {
      try {
        const savedValue =
          localStorage.getItem(key);

        return savedValue
          ? JSON.parse(savedValue)
          : fallbackValue;
      } catch (error) {
        console.error(
          `Could not read ${key}:`,
          error
        );

        return fallbackValue;
      }
    }

    function saveHistory() {
      try {
        localStorage.setItem(
          HISTORY_STORAGE_KEY,
          JSON.stringify(journalHistory)
        );
      } catch (error) {
        console.error(
          "Could not save journal history:",
          error
        );
      }
    }

    function escapeHTML(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function stripTime(dateValue) {
      const date = dateValue
        ? new Date(dateValue)
        : new Date();

      if (Number.isNaN(date.getTime())) {
        return new Date().toISOString().slice(0, 10);
      }

      return [
        date.getFullYear(),
        String(date.getMonth() + 1).padStart(2, "0"),
        String(date.getDate()).padStart(2, "0")
      ].join("-");
    }

    function formatDate(dateValue) {
      const date = new Date(
        `${dateValue}T12:00:00`
      );

      return date.toLocaleDateString(
        undefined,
        {
          weekday: "long",
          month: "long",
          day: "numeric",
          year: "numeric"
        }
      );
    }

    function countWords(text) {
      const cleanedText =
        String(text || "").trim();

      if (!cleanedText) {
        return 0;
      }

      return cleanedText
        .split(/\s+/)
        .filter(Boolean)
        .length;
    }

    function collectTextValues(value) {
      if (typeof value === "string") {
        return value.trim();
      }

      if (Array.isArray(value)) {
        return value
          .map(collectTextValues)
          .filter(Boolean)
          .join("\n");
      }

      if (
        value &&
        typeof value === "object"
      ) {
        return Object.entries(value)
          .filter(([key]) => {
            return ![
              "date",
              "lastSaved",
              "emoji",
              "mood"
            ].includes(key);
          })
          .map(([, item]) => {
            return collectTextValues(item);
          })
          .filter(Boolean)
          .join("\n");
      }

      return "";
    }

    function createSummary(source, data) {
      if (
        source.type === "mood" &&
        data.mood
      ) {
        const emoji =
          data.mood.emoji || "🙂";

        const mood =
          data.mood.mood || "Mood saved";

        return `${emoji} ${mood}`;
      }

      const text =
        collectTextValues(data);

      if (!text) {
        return "A journal entry was saved.";
      }

      return text.length > 110
        ? `${text.slice(0, 110)}…`
        : text;
    }

    function createDetails(source, data) {
      if (source.type === "mood") {
        const moodText =
          data.mood
            ? `${data.mood.emoji || "🙂"} ${
                data.mood.mood || ""
              }`
            : "";

        const sections = [
          moodText
            ? `Mood: ${moodText}`
            : "",
          data.peaceful
            ? `Peaceful moment:\n${data.peaceful}`
            : "",
          data.grateful
            ? `Gratitude:\n${data.grateful}`
            : "",
          data.tomorrowFocus
            ? `Tomorrow's focus:\n${data.tomorrowFocus}`
            : "",
          data.additionalThoughts
            ? `Additional thoughts:\n${data.additionalThoughts}`
            : ""
        ];

        return sections
          .filter(Boolean)
          .join("\n\n");
      }

      if (source.type === "gratitude") {
        return [
          data.gratitude
            ? `Three things I am grateful for:\n${data.gratitude}`
            : "",
          data.person
            ? `Someone I appreciate:\n${data.person}`
            : "",
          data.moment
            ? `A moment that made me smile:\n${data.moment}`
            : ""
        ]
          .filter(Boolean)
          .join("\n\n");
      }

      if (source.type === "goals") {
        return [
          data.dream
            ? `My biggest dream:\n${data.dream}`
            : "",
          data.goal
            ? `A goal I want to achieve:\n${data.goal}`
            : "",
          data.step
            ? `One step I can take:\n${data.step}`
            : ""
        ]
          .filter(Boolean)
          .join("\n\n");
      }

      if (source.type === "reflection") {
        return [
          data.moment
            ? `The moment that shaped my day:\n${data.moment}`
            : "",
          data.lesson
            ? `What I learned about myself:\n${data.lesson}`
            : "",
          data.release
            ? `What I want to release:\n${data.release}`
            : ""
        ]
          .filter(Boolean)
          .join("\n\n");
      }

      return collectTextValues(data);
    }

    function captureCurrentEntries() {
      const savedHistory =
        readJSON(
          HISTORY_STORAGE_KEY,
          []
        );

      journalHistory =
        Array.isArray(savedHistory)
          ? savedHistory
          : [];

      STORAGE_SOURCES.forEach((source) => {
        const data =
          readJSON(source.key, null);

        if (!data) {
          return;
        }

        const details =
          createDetails(source, data);

        const hasMeaningfulContent =
          details.trim().length > 0;

        if (!hasMeaningfulContent) {
          return;
        }

        const savedDate =
          data.lastSaved ||
          data.date ||
          new Date().toISOString();

        const day =
          stripTime(savedDate);

        const signature =
          `${source.type}-${day}-${details}`;

        const alreadyExists =
          journalHistory.some((entry) => {
            return entry.signature === signature;
          });

        if (alreadyExists) {
          return;
        }

        journalHistory.push({
          id:
            `${Date.now()}-${source.type}-${Math.random()}`,
          signature,
          type: source.type,
          title: source.title,
          icon: source.icon,
          date: day,
          createdAt: savedDate,
          summary: createSummary(source, data),
          details,
          words: countWords(details)
        });
      });

      journalHistory.sort((a, b) => {
        return new Date(b.createdAt) -
          new Date(a.createdAt);
      });

      journalHistory =
        journalHistory.slice(0, 150);

      saveHistory();
    }

    function openHistoryWindow(view) {
      currentView = view;

      captureCurrentEntries();

      if (view === "calendar") {
        modalLabel.textContent =
          "Your reflection calendar";

        modalTitle.textContent =
          "Calendar Highlights";

        modalDescription.textContent =
          "Highlighted dates contain saved journal activity.";

        renderCalendar();
      }

      if (view === "timeline") {
        modalLabel.textContent =
          "Your personal journey";

        modalTitle.textContent =
          "Reflection Timeline";

        modalDescription.textContent =
          "Tap any entry to reveal its full reflection.";

        renderTimeline();
      }

      if (view === "insights") {
        modalLabel.textContent =
          "Your monthly patterns";

        modalTitle.textContent =
          "Monthly Insights";

        modalDescription.textContent =
          "A gentle overview of your writing and activity.";

        renderInsights();
      }

      modalOverlay.classList.add("open");

      modalOverlay.setAttribute(
        "aria-hidden",
        "false"
      );

      document.body.style.overflow = "hidden";
    }

    function closeHistoryWindow() {
      modalOverlay.classList.remove("open");

      modalOverlay.setAttribute(
        "aria-hidden",
        "true"
      );

      document.body.style.overflow = "";
    }

    function renderCalendar() {
      const year =
        calendarDate.getFullYear();

      const month =
        calendarDate.getMonth();

      const monthName =
        calendarDate.toLocaleDateString(
          undefined,
          {
            month: "long",
            year: "numeric"
          }
        );

      const firstDay =
        new Date(year, month, 1).getDay();

      const daysInMonth =
        new Date(
          year,
          month + 1,
          0
        ).getDate();

      const todayKey =
        stripTime(new Date());

      const entriesByDate = {};

      journalHistory.forEach((entry) => {
        if (!entriesByDate[entry.date]) {
          entriesByDate[entry.date] = [];
        }

        entriesByDate[entry.date].push(entry);
      });

      let calendarDaysHTML = "";

      for (
        let emptyIndex = 0;
        emptyIndex < firstDay;
        emptyIndex += 1
      ) {
        calendarDaysHTML += `
          <button
            class="calendar-day empty"
            type="button"
            tabindex="-1"
          ></button>
        `;
      }

      for (
        let day = 1;
        day <= daysInMonth;
        day += 1
      ) {
        const dateKey = [
          year,
          String(month + 1).padStart(2, "0"),
          String(day).padStart(2, "0")
        ].join("-");

        const hasEntries =
          Boolean(entriesByDate[dateKey]);

        const isToday =
          dateKey === todayKey;

        calendarDaysHTML += `
          <button
            class="
              calendar-day
              ${hasEntries ? "highlighted" : ""}
              ${isToday ? "today" : ""}
            "
            type="button"
            data-date="${dateKey}"
            aria-label="${escapeHTML(
              formatDate(dateKey)
            )}"
          >
            <span>${day}</span>
            ${
              hasEntries
                ? '<span class="calendar-dot"></span>'
                : ""
            }
          </button>
        `;
      }

      modalContent.innerHTML = `
        <div class="calendar-card">

          <div class="calendar-navigation">

            <button
              class="calendar-navigation-button"
              id="previousMonthButton"
              type="button"
              aria-label="Previous month"
            >
              ‹
            </button>

            <h3 class="calendar-month">
              ${escapeHTML(monthName)}
            </h3>

            <button
              class="calendar-navigation-button"
              id="nextMonthButton"
              type="button"
              aria-label="Next month"
            >
              ›
            </button>

          </div>

          <div class="calendar-weekdays">
            <span class="weekday">Sun</span>
            <span class="weekday">Mon</span>
            <span class="weekday">Tue</span>
            <span class="weekday">Wed</span>
            <span class="weekday">Thu</span>
            <span class="weekday">Fri</span>
            <span class="weekday">Sat</span>
          </div>

          <div class="calendar-grid">
            ${calendarDaysHTML}
          </div>

          <div class="calendar-legend">

            <div class="legend-item">
              <span class="legend-color"></span>
              Saved activity
            </div>

            <div class="legend-item">
              <span class="legend-outline"></span>
              Today
            </div>

          </div>

        </div>

        <div
          class="day-details"
          id="dayDetails"
        >
          <h3 class="day-details-title">
            Select a highlighted day
          </h3>

          <p class="day-details-text">
            Tap a highlighted date to view the journal
            sections saved on that day.
          </p>
        </div>
      `;

      document
        .getElementById("previousMonthButton")
        .addEventListener("click", () => {
          calendarDate = new Date(
            year,
            month - 1,
            1
          );

          renderCalendar();
        });

      document
        .getElementById("nextMonthButton")
        .addEventListener("click", () => {
          calendarDate = new Date(
            year,
            month + 1,
            1
          );

          renderCalendar();
        });

      document
        .querySelectorAll(
          ".calendar-day:not(.empty)"
        )
        .forEach((dayButton) => {
          dayButton.addEventListener(
            "click",
            () => {
              document
                .querySelectorAll(
                  ".calendar-day"
                )
                .forEach((button) => {
                  button.classList.remove(
                    "selected"
                  );
                });

              dayButton.classList.add(
                "selected"
              );

              showDayDetails(
                dayButton.dataset.date,
                entriesByDate[
                  dayButton.dataset.date
                ] || []
              );
            }
          );
        });
    }

    function showDayDetails(
      dateKey,
      entries
    ) {
      const dayDetails =
        document.getElementById("dayDetails");

      if (!entries.length) {
        dayDetails.innerHTML = `
          <h3 class="day-details-title">
            ${escapeHTML(formatDate(dateKey))}
          </h3>

          <p class="day-details-text">
            No saved journal activity was found for this day.
          </p>
        `;

        return;
      }

      const entriesHTML =
        entries
          .map((entry) => {
            return `
              <div class="day-entry">

                <div class="day-entry-title">
                  ${escapeHTML(entry.icon)}
                  ${escapeHTML(entry.title)}
                </div>

                <div class="day-entry-summary">
                  ${escapeHTML(entry.summary)}
                </div>

              </div>
            `;
          })
          .join("");

      dayDetails.innerHTML = `
        <h3 class="day-details-title">
          ${escapeHTML(formatDate(dateKey))}
        </h3>

        <p class="day-details-text">
          You saved ${entries.length}
          journal ${
            entries.length === 1
              ? "section"
              : "sections"
          } on this day.
        </p>

        ${entriesHTML}
      `;
    }

    function renderTimeline() {
      if (!journalHistory.length) {
        modalContent.innerHTML = `
          <div class="empty-state">

            <div class="empty-icon">📖</div>

            <h3 class="empty-title">
              Your story begins here
            </h3>

            <p class="empty-text">
              Complete a Mood Tracker, Gratitude Journal,
              Goals & Dreams or Daily Reflection entry.
              Your saved writing will then appear here.
            </p>

          </div>
        `;

        return;
      }

      const timelineHTML =
        journalHistory
          .map((entry) => {
            return `
              <button
                class="timeline-entry"
                type="button"
                aria-expanded="false"
              >

                <div class="timeline-entry-header">

                  <div class="timeline-icon">
                    ${escapeHTML(entry.icon)}
                  </div>

                  <div class="timeline-information">

                    <div class="timeline-title">
                      ${escapeHTML(entry.title)}
                    </div>

                    <div class="timeline-date">
                      ${escapeHTML(
                        formatDate(entry.date)
                      )}
                      · ${entry.words || 0} words
                    </div>

                  </div>

                </div>

                <p class="timeline-summary">
                  ${escapeHTML(entry.summary)}
                </p>

                <div class="timeline-details">
                  ${escapeHTML(entry.details)}
                </div>

                <div class="timeline-hint">
                  Tap to view or hide the full entry
                </div>

              </button>
            `;
          })
          .join("");

      modalContent.innerHTML = `
        <div class="timeline-list">
          ${timelineHTML}
        </div>
      `;

      document
        .querySelectorAll(".timeline-entry")
        .forEach((entryButton) => {
          entryButton.addEventListener(
            "click",
            () => {
              const isExpanded =
                entryButton.classList.toggle(
                  "expanded"
                );

              entryButton.setAttribute(
                "aria-expanded",
                String(isExpanded)
              );
            }
          );
        });
    }

    function renderInsights() {
      const now = new Date();

      const currentMonthEntries =
        journalHistory.filter((entry) => {
          const entryDate =
            new Date(
              `${entry.date}T12:00:00`
            );

          return (
            entryDate.getMonth() ===
              now.getMonth() &&
            entryDate.getFullYear() ===
              now.getFullYear()
          );
        });

      const activeDays =
        new Set(
          currentMonthEntries.map(
            (entry) => entry.date
          )
        ).size;

      const totalWords =
        currentMonthEntries.reduce(
          (total, entry) => {
            return total +
              Number(entry.words || 0);
          },
          0
        );

      const completedSections =
        currentMonthEntries.length;

      const categoryCount = {
        mood: 0,
        gratitude: 0,
        goals: 0,
        reflection: 0
      };

      currentMonthEntries.forEach((entry) => {
        if (
          Object.hasOwn(
            categoryCount,
            entry.type
          )
        ) {
          categoryCount[entry.type] += 1;
        }
      });

      const latestMoodEntry =
        journalHistory.find((entry) => {
          return entry.type === "mood";
        });

      const latestMood =
        latestMoodEntry
          ? latestMoodEntry.summary
          : "Not recorded";

      const highestCategory =
        Object.entries(categoryCount)
          .sort((a, b) => b[1] - a[1])[0];

      let insightMessage =
        "Every honest entry helps you understand yourself a little better.";

      if (completedSections >= 8) {
        insightMessage =
          "You have created a strong reflection rhythm this month. Your consistency is becoming part of your personal growth.";
      } else if (completedSections >= 4) {
        insightMessage =
          "You are building a meaningful reflection habit. Continue noticing the moments and thoughts that matter.";
      } else if (completedSections > 0) {
        insightMessage =
          "Your journal already contains the beginning of a valuable personal story. Small entries still create real insight.";
      }

      const maximumCategoryValue =
        Math.max(
          1,
          ...Object.values(categoryCount)
        );

      function progressWidth(value) {
        return Math.round(
          (value / maximumCategoryValue) *
            100
        );
      }

      modalContent.innerHTML = `
        <div class="insights-grid">

          <div class="insight-card">
            <div class="insight-icon">📆</div>
            <div class="insight-number">
              ${activeDays}
            </div>
            <div class="insight-label">
              Active journal days
            </div>
          </div>

          <div class="insight-card">
            <div class="insight-icon">📝</div>
            <div class="insight-number">
              ${completedSections}
            </div>
            <div class="insight-label">
              Saved sections
            </div>
          </div>

          <div class="insight-card">
            <div class="insight-icon">✍️</div>
            <div class="insight-number">
              ${totalWords}
            </div>
            <div class="insight-label">
              Words reflected
            </div>
          </div>

          <div class="insight-card">
            <div class="insight-icon">🌱</div>
            <div class="insight-number">
              ${journalHistory.length}
            </div>
            <div class="insight-label">
              Total history entries
            </div>
          </div>

        </div>

        <div class="insight-message">

          <h3 class="insight-message-title">
            Your gentle insight
          </h3>

          <p class="insight-message-text">
            ${escapeHTML(insightMessage)}
          </p>

          <p class="insight-message-text">
            Latest mood:
            <strong>
              ${escapeHTML(latestMood)}
            </strong>
          </p>

          ${
            highestCategory &&
            highestCategory[1] > 0
              ? `
                <p class="insight-message-text">
                  Your most active section this month is
                  <strong>
                    ${escapeHTML(
                      categoryName(
                        highestCategory[0]
                      )
                    )}
                  </strong>.
                </p>
              `
              : ""
          }

        </div>

        <div class="category-progress">

          <h3 class="progress-title">
            Reflection activity
          </h3>

          ${createProgressRow(
            "Mood Tracker",
            categoryCount.mood,
            progressWidth(
              categoryCount.mood
            )
          )}

          ${createProgressRow(
            "Gratitude Journal",
            categoryCount.gratitude,
            progressWidth(
              categoryCount.gratitude
            )
          )}

          ${createProgressRow(
            "Goals & Dreams",
            categoryCount.goals,
            progressWidth(
              categoryCount.goals
            )
          )}

          ${createProgressRow(
            "Daily Reflection",
            categoryCount.reflection,
            progressWidth(
              categoryCount.reflection
            )
          )}

        </div>
      `;
    }

    function createProgressRow(
      label,
      value,
      width
    ) {
      return `
        <div class="progress-row">

          <div class="progress-header">
            <span>${escapeHTML(label)}</span>
            <span>${value}</span>
          </div>

          <div class="progress-track">
            <div
              class="progress-fill"
              style="width: ${width}%"
            ></div>
          </div>

        </div>
      `;
    }

    function categoryName(type) {
      const names = {
        mood: "Mood Tracker",
        gratitude: "Gratitude Journal",
        goals: "Goals & Dreams",
        reflection: "Daily Reflection"
      };

      return names[type] || type;
    }

    function refreshHistory() {
      captureCurrentEntries();

      if (
        modalOverlay.classList.contains(
          "open"
        )
      ) {
        openHistoryWindow(currentView);
      }

      showToast("Journal history refreshed ✓");
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");

      clearTimeout(toastTimer);

      toastTimer = setTimeout(() => {
        toast.classList.remove("show");
      }, 2300);
    }

    historyButtons.forEach((button) => {
      button.addEventListener("click", () => {
        openHistoryWindow(
          button.dataset.view
        );
      });
    });

    closeButton.addEventListener(
      "click",
      closeHistoryWindow
    );

    exitButton.addEventListener(
      "click",
      closeHistoryWindow
    );

    refreshHistoryButton.addEventListener(
      "click",
      refreshHistory
    );

    backToJournalButton.addEventListener(
      "click",
      () => {
        window.location.href =
          "journal.html";
      }
    );

    modalOverlay.addEventListener(
      "click",
      (event) => {
        if (event.target === modalOverlay) {
          closeHistoryWindow();
        }
      }
    );

    historyModal.addEventListener(
      "click",
      (event) => {
        event.stopPropagation();
      }
    );

    document.addEventListener(
      "keydown",
      (event) => {
        if (
          event.key === "Escape" &&
          modalOverlay.classList.contains(
            "open"
          )
        ) {
          closeHistoryWindow();
        }
      }
    );

    captureCurrentEntries();
  </script>

  <script src="performance.js"></script>

</body>
</html>
