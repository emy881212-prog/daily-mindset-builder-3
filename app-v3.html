<style>
  .screen {
    position: relative !important;
    overflow: hidden !important;
  }

  .screen > *:not(.soft-bubbles-fixed) {
    position: relative;
    z-index: 3;
  }

  /* slow white bubbles */
  .soft-bubbles-fixed {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    overflow: hidden;
  }

  .soft-bubbles-fixed span {
    position: absolute;
    bottom: -50px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.45);
    box-shadow: 0 0 16px rgba(255, 255, 255, 0.75);
    animation: slowBubbleMove 16s linear infinite;
  }

  .soft-bubbles-fixed span:nth-child(1) { left: 7%; width: 7px; height: 7px; animation-delay: 0s; }
  .soft-bubbles-fixed span:nth-child(2) { left: 18%; width: 11px; height: 11px; animation-delay: 3s; }
  .soft-bubbles-fixed span:nth-child(3) { left: 30%; width: 6px; height: 6px; animation-delay: 6s; }
  .soft-bubbles-fixed span:nth-child(4) { left: 45%; width: 13px; height: 13px; animation-delay: 1s; }
  .soft-bubbles-fixed span:nth-child(5) { left: 58%; width: 8px; height: 8px; animation-delay: 5s; }
  .soft-bubbles-fixed span:nth-child(6) { left: 72%; width: 10px; height: 10px; animation-delay: 2s; }
  .soft-bubbles-fixed span:nth-child(7) { left: 84%; width: 6px; height: 6px; animation-delay: 8s; }
  .soft-bubbles-fixed span:nth-child(8) { left: 94%; width: 12px; height: 12px; animation-delay: 4s; }

  @keyframes slowBubbleMove {
    0% {
      transform: translateY(0) translateX(0) scale(0.75);
      opacity: 0;
    }

    12% {
      opacity: 0.55;
    }

    50% {
      transform: translateY(-48vh) translateX(18px) scale(1);
      opacity: 0.45;
    }

    100% {
      transform: translateY(-110vh) translateX(-18px) scale(1.25);
      opacity: 0;
    }
  }

  /* corrected arrows */
  .arrows {
    position: absolute !important;
    bottom: 26px !important;
    left: 34px !important;
    right: 34px !important;
    height: 34px !important;
    display: flex !important;
    justify-content: space-between !important;
    align-items: center !important;
    z-index: 30 !important;
    pointer-events: none !important;
  }

  .arrow-btn {
    width: 95px !important;
    height: 34px !important;
    border: none !important;
    background: transparent !important;
    cursor: pointer !important;
    position: relative !important;
    pointer-events: auto !important;
    font-size: 0 !important;
    color: transparent !important;
    box-shadow: none !important;
  }

  .arrow-btn::before {
    content: "" !important;
    position: absolute !important;
    top: 50% !important;
    width: 70px !important;
    height: 2px !important;
    background: white !important;
    box-shadow: 0 0 8px rgba(255,255,255,0.95) !important;
  }

  .arrow-btn.left::before {
    left: 22px !important;
  }

  .arrow-btn.right::before {
    right: 22px !important;
  }

  .arrow-btn.left::after {
    content: "←" !important;
    position: absolute !important;
    left: 0 !important;
    top: -8px !important;
    color: white !important;
    font-size: 34px !important;
    font-family: Arial, Helvetica, sans-serif !important;
    text-shadow: 0 0 8px rgba(255,255,255,0.95) !important;
  }

  .arrow-btn.right::after {
    content: "→" !important;
    position: absolute !important;
    right: 0 !important;
    top: -8px !important;
    color: white !important;
    font-size: 34px !important;
    font-family: Arial, Helvetica, sans-serif !important;
    text-shadow: 0 0 8px rgba(255,255,255,0.95) !important;
  }

  .arrow-btn.left:hover {
    transform: translateX(-8px) scale(1.08) !important;
  }

  .arrow-btn.right:hover {
    transform: translateX(8px) scale(1.08) !important;
  }

  .quote-mini-text {
    position: absolute !important;
    left: 50% !important;
    bottom: 6px !important;
    transform: translateX(-50%) !important;
    font-family: Arial, Helvetica, sans-serif !important;
    font-size: 10px !important;
    letter-spacing: 0.4px !important;
    color: rgba(255, 255, 255, 0.95) !important;
    text-shadow: 0 0 8px rgba(255,255,255,0.9) !important;
    white-space: nowrap !important;
    pointer-events: none !important;
  }

  .start-btn {
    font-size: 28px !important;
    line-height: 1 !important;
  }
</style>

<script>
  function applyFinalSmallChanges() {
    const screen = document.querySelector(".screen");

    if (screen && !document.querySelector(".soft-bubbles-fixed")) {
      screen.insertAdjacentHTML(
        "afterbegin",
        `
        <div class="soft-bubbles-fixed">
          <span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span>
        </div>
        `
      );
    }

    const arrows = document.querySelector(".arrows");

    if (arrows) {
      const leftArrow = document.getElementById("prevQuoteBtn");
      const rightArrow = document.getElementById("nextQuoteBtn");

      if (leftArrow) {
        leftArrow.classList.add("left");
        leftArrow.innerHTML = "";
      }

      if (rightArrow) {
        rightArrow.classList.add("right");
        rightArrow.innerHTML = "";
      }

      if (!document.getElementById("quoteMiniText")) {
        arrows.insertAdjacentHTML(
          "beforeend",
          '<span class="quote-mini-text" id="quoteMiniText">1 / 10 free quotes</span>'
        );
      }
    }

    document.querySelectorAll("button").forEach(button => {
      const text = button.innerText.trim().toLowerCase();

      if (text.includes("start") && text.includes("again")) {
        const newBackButton = button.cloneNode(true);
        newBackButton.innerHTML = "Back";

        button.parentNode.replaceChild(newBackButton, button);

        newBackButton.addEventListener("click", () => {
          if (typeof resultScreen !== "undefined") {
            resultScreen.style.display = "none";
          }

          if (typeof quizScreen !== "undefined") {
            quizScreen.style.display = "block";
          }

          if (typeof currentQuestion !== "undefined" && typeof questions !== "undefined") {
            currentQuestion = questions.length - 1;
          }

          if (typeof loadQuestion === "function") {
            loadQuestion();
          }

          window.scrollTo(0, 0);
        });
      }
    });
  }

  applyFinalSmallChanges();
  setTimeout(applyFinalSmallChanges, 300);
  setTimeout(applyFinalSmallChanges, 1000);
</script>
