<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Smart Self-Reminder</title>
  <link rel="stylesheet" href="performance.css">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{--top:#fffafb;--middle:#eee9ed;--bottom:#817e8c;--panel1:#ead8da;--panel2:#c5adb0;--button1:#efb5aa;--button2:#d9a099;--button3:#ae8985;--dark:#171416}
    html{min-height:100%;background:var(--bottom)}
    body{min-height:100vh;min-height:100dvh;overflow-x:hidden;color:var(--dark);font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at 24% 7%,rgba(255,255,255,.9),transparent 31%),linear-gradient(180deg,var(--top) 0%,var(--middle) 40%,var(--bottom) 100%)}
    button,input,textarea,select{font:inherit}
    button{border:0;cursor:pointer;touch-action:manipulation}
    .bubbles{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
    .bubble{position:absolute;bottom:-55px;width:var(--size);height:var(--size);border:1px solid rgba(255,255,255,.45);border-radius:50%;background:rgba(255,255,255,.11);box-shadow:inset 0 0 12px rgba(255,255,255,.28),0 4px 17px rgba(255,255,255,.08);animation:rise var(--duration) linear infinite;animation-delay:var(--delay)}
    .bubble:nth-child(1){left:7%;--size:18px;--duration:17s;--delay:-4s}.bubble:nth-child(2){left:24%;--size:11px;--duration:14s;--delay:-9s}.bubble:nth-child(3){left:43%;--size:25px;--duration:21s;--delay:-13s}.bubble:nth-child(4){left:63%;--size:15px;--duration:16s;--delay:-6s}.bubble:nth-child(5){left:79%;--size:21px;--duration:19s;--delay:-11s}.bubble:nth-child(6){left:92%;--size:12px;--duration:15s;--delay:-7s}
    @keyframes rise{0%{transform:translate3d(0,0,0);opacity:0}12%{opacity:.7}50%{transform:translate3d(11px,-55vh,0)}100%{transform:translate3d(-8px,-115vh,0);opacity:0}}
    .app{position:relative;z-index:1;width:100%;max-width:430px;min-height:100vh;min-height:100dvh;margin:0 auto;padding:max(13px,env(safe-area-inset-top)) 20px max(25px,env(safe-area-inset-bottom))}
    .header{display:flex;align-items:center;gap:12px;margin-bottom:8px}
    .logo-button{display:grid;place-items:center;width:56px;min-width:56px;height:56px;border:10px solid rgba(255,255,255,.94);border-radius:50%;color:white;background:#17181c;box-shadow:0 3px 8px rgba(0,0,0,.18),inset 0 0 0 1px rgba(255,255,255,.06)}
    .logo-symbol{font-size:25px;line-height:1;pointer-events:none}.brand-name{font-family:Georgia,"Times New Roman",serif;font-size:16px;font-weight:500}
    .title-wrapper{display:flex;justify-content:center;width:100%;margin:5px 0 14px}.title-box{width:100%;padding:12px 18px 13px;text-align:center;background:rgba(255,255,255,.62);box-shadow:0 7px 22px rgba(77,70,77,.06)}
    .page-title{font-family:Georgia,"Times New Roman",serif;font-size:clamp(29px,8.2vw,38px);font-weight:500;font-style:italic;line-height:1;letter-spacing:-1.2px}.page-subtitle{max-width:320px;margin:8px auto 0;font-family:Georgia,"Times New Roman",serif;font-size:13px;line-height:1.4;color:rgba(43,37,40,.62)}
    .panel{padding:54px 13px 44px;border:2px solid rgba(177,112,112,.5);border-radius:66px;background:radial-gradient(circle at 50% 6%,rgba(255,255,255,.24),transparent 35%),linear-gradient(145deg,var(--panel1),var(--panel2));box-shadow:0 13px 23px rgba(45,38,48,.29),inset 5px 5px 14px rgba(255,255,255,.23),inset -7px -7px 15px rgba(104,75,84,.15)}
    .list{display:flex;flex-direction:column;gap:36px}.reminder-card{position:relative;width:100%;min-height:132px;padding:19px 26px;border:1.5px solid #171517;border-radius:999px;color:var(--dark);text-align:left;background:linear-gradient(100deg,var(--button1) 0%,var(--button2) 52%,var(--button3) 100%);box-shadow:0 12px 10px rgba(61,49,57,.37),inset 3px 3px 5px rgba(255,255,255,.32),inset -4px -4px 8px rgba(83,56,57,.18);transition:transform 160ms ease,box-shadow 160ms ease,filter 160ms ease;overflow:hidden}
    .reminder-card::after{content:"Edit";position:absolute;right:20px;top:16px;padding:5px 9px;border-radius:999px;color:rgba(30,24,27,.62);background:rgba(255,255,255,.34);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}.reminder-card:active{transform:translateY(4px) scale(.986);box-shadow:0 6px 7px rgba(61,49,57,.31),inset 2px 2px 5px rgba(90,59,63,.14)}.reminder-card.disabled{filter:saturate(.45);opacity:.72}
    .card-heading{display:flex;align-items:center;gap:8px;padding-right:42px}.card-icon{font-size:22px;line-height:1}.card-title{font-family:Georgia,"Times New Roman",serif;font-size:22px;line-height:1.08}.card-message{display:-webkit-box;margin-top:8px;overflow:hidden;color:rgba(44,34,39,.72);font-size:12px;line-height:1.38;-webkit-box-orient:vertical;-webkit-line-clamp:2}.card-meta{display:flex;align-items:center;gap:7px;margin-top:9px;color:rgba(35,28,31,.68);font-size:11px;font-weight:700}.status-dot{width:7px;height:7px;border-radius:50%;background:#2f704b;box-shadow:0 0 0 3px rgba(255,255,255,.22)}.disabled .status-dot{background:#766a6d}
    .save-button{display:block;width:73%;min-height:51px;margin:24px auto 0;border:1.5px solid #171517;border-radius:999px;color:#151315;background:rgba(247,247,247,.83);font-family:Georgia,"Times New Roman",serif;font-size:29px;font-weight:700;box-shadow:0 6px 8px rgba(34,29,34,.32),inset 0 1px 0 rgba(255,255,255,.75)}.save-button:active{transform:translateY(3px) scale(.99);background:#fff}.summary{margin:14px auto 0;max-width:310px;text-align:center;color:rgba(255,255,255,.9);font-size:12px;line-height:1.4;text-shadow:0 1px 4px rgba(0,0,0,.18)}
    .backdrop{position:fixed;inset:0;z-index:50;display:none;align-items:flex-end;justify-content:center;padding:18px;background:rgba(25,20,25,.42);backdrop-filter:blur(7px)}.backdrop.open{display:flex}.sheet{width:min(410px,100%);max-height:88dvh;overflow-y:auto;padding:22px 20px max(22px,env(safe-area-inset-bottom));border:1px solid rgba(255,255,255,.54);border-radius:34px;background:linear-gradient(160deg,rgba(255,250,251,.98),rgba(232,211,216,.98));box-shadow:0 24px 70px rgba(23,18,23,.36)}.sheet-top{display:flex;align-items:center;justify-content:space-between;gap:15px;margin-bottom:18px}.sheet-title{font-family:Georgia,"Times New Roman",serif;font-size:27px;font-style:italic;font-weight:500}.close-button{width:38px;height:38px;border-radius:50%;color:white;background:#171517;font-size:20px}
    .field{display:block;margin-top:14px}.field-label{display:block;margin:0 0 7px 4px;color:#4e4147;font-size:12px;font-weight:800;letter-spacing:.04em;text-transform:uppercase}.field-control{width:100%;border:1px solid rgba(34,27,31,.25);border-radius:18px;outline:none;color:#211b1e;background:rgba(255,255,255,.72);box-shadow:inset 0 2px 7px rgba(80,55,64,.08)}input.field-control,select.field-control{min-height:50px;padding:0 14px}textarea.field-control{min-height:104px;resize:vertical;padding:13px 14px;line-height:1.45}.field-control:focus{border-color:rgba(112,67,81,.58);box-shadow:0 0 0 4px rgba(188,133,151,.16)}
    .switch-row{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-top:17px;padding:13px 14px;border-radius:18px;background:rgba(255,255,255,.48)}.switch-copy strong{display:block;font-size:14px}.switch-copy span{display:block;margin-top:3px;color:rgba(51,40,45,.64);font-size:11px;line-height:1.35}.switch{position:relative;width:52px;min-width:52px;height:30px}.switch input{position:absolute;opacity:0;pointer-events:none}.track{position:absolute;inset:0;border-radius:999px;background:#998d92}.track::after{content:"";position:absolute;top:4px;left:4px;width:22px;height:22px;border-radius:50%;background:white;box-shadow:0 2px 6px rgba(0,0,0,.22);transition:transform 160ms ease}.switch input:checked+.track{background:#282328}.switch input:checked+.track::after{transform:translateX(22px)}
    .actions{display:grid;grid-template-columns:1fr 1.25fr;gap:10px;margin-top:19px}.action{min-height:50px;border-radius:999px;font-weight:800}.secondary{color:#282126;background:rgba(255,255,255,.7);border:1px solid rgba(38,30,35,.2)}.primary{color:white;background:#171517}.toast{position:fixed;z-index:80;left:50%;bottom:max(22px,env(safe-area-inset-bottom));width:max-content;max-width:calc(100% - 36px);padding:11px 16px;border-radius:999px;color:white;text-align:center;background:rgba(23,20,23,.93);box-shadow:0 12px 28px rgba(0,0,0,.28);opacity:0;transform:translate(-50%,18px);pointer-events:none;transition:opacity 180ms ease,transform 180ms ease;font-size:13px}.toast.show{opacity:1;transform:translate(-50%,0)}
    @media(max-width:370px){.app{padding-left:14px;padding-right:14px}.panel{padding-left:11px;padding-right:11px;border-radius:57px}.reminder-card{min-height:126px;padding-left:22px}.card-title{font-size:20px}}
  </style>
</head>
<body>
  <div class="bubbles" aria-hidden="true"><span class="bubble"></span><span class="bubble"></span><span class="bubble"></span><span class="bubble"></span><span class="bubble"></span><span class="bubble"></span></div>
  <main class="app">
    <header class="header">
      <button class="logo-button" type="button" onclick="window.location.href='journal.html'" aria-label="Return to journal"><span class="logo-symbol">✦</span></button>
      <p class="brand-name">Daily Mindset Builder</p>
    </header>
    <div class="title-wrapper"><div class="title-box"><h1 class="page-title">Smart Self-Reminder</h1><p class="page-subtitle">Gentle, useful prompts that support focus, calm decisions and kinder self-talk.</p></div></div>
    <section class="panel"><div class="list" id="reminderList"></div></section>
    <button class="save-button" id="saveButton" type="button">SAVE</button>
    <p class="summary" id="summary">Your reminders are saved privately on this device.</p>
  </main>

  <div class="backdrop" id="backdrop" aria-hidden="true">
    <section class="sheet" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
      <div class="sheet-top"><h2 class="sheet-title" id="sheetTitle">Edit reminder</h2><button class="close-button" id="closeButton" type="button">×</button></div>
      <label class="field"><span class="field-label">Reminder title</span><input class="field-control" id="titleInput" maxlength="42"></label>
      <label class="field"><span class="field-label">Helpful message</span><textarea class="field-control" id="messageInput" maxlength="220"></textarea></label>
      <label class="field"><span class="field-label">Reminder time</span><input class="field-control" id="timeInput" type="time"></label>
      <label class="field"><span class="field-label">Repeat</span><select class="field-control" id="repeatInput"><option value="daily">Every day</option><option value="weekdays">Weekdays</option><option value="weekends">Weekends</option></select></label>
      <div class="switch-row"><div class="switch-copy"><strong>Reminder enabled</strong><span>Show this prompt at the selected time.</span></div><label class="switch"><input id="enabledInput" type="checkbox"><span class="track"></span></label></div>
      <div class="actions"><button class="action secondary" id="resetButton" type="button">Reset</button><button class="action primary" id="applyButton" type="button">Apply Reminder</button></div>
    </section>
  </div>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const STORAGE_KEY='dailyMindsetSmartRemindersV2';
    const defaults=[
      {id:'focus',icon:'🎯',title:'One Meaningful Priority',message:'Choose one important task for today. Focused progress is more useful than trying to do everything at once.',time:'09:00',repeat:'daily',enabled:true},
      {id:'pause',icon:'🌿',title:'Pause Before Reacting',message:'Take three slow breaths, then ask: what response will help me most right now?',time:'14:00',repeat:'daily',enabled:true},
      {id:'kindness',icon:'🤍',title:'Gentle Self-Talk',message:'Notice one thing you handled well today. Progress matters more than perfection.',time:'20:30',repeat:'daily',enabled:true}
    ];
    let reminders=load();let editing=-1;let toastTimer;
    const list=document.getElementById('reminderList'),backdrop=document.getElementById('backdrop'),titleInput=document.getElementById('titleInput'),messageInput=document.getElementById('messageInput'),timeInput=document.getElementById('timeInput'),repeatInput=document.getElementById('repeatInput'),enabledInput=document.getElementById('enabledInput'),summary=document.getElementById('summary'),toast=document.getElementById('toast');
    function load(){try{const value=JSON.parse(localStorage.getItem(STORAGE_KEY)||'null');return Array.isArray(value)&&value.length===3?defaults.map((d,i)=>({...d,...value[i],id:d.id,icon:d.icon})):defaults.map(x=>({...x}))}catch{return defaults.map(x=>({...x}))}}
    function safe(value){return String(value??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
    function repeatLabel(value){return value==='weekdays'?'Weekdays':value==='weekends'?'Weekends':'Every day'}
    function render(){list.innerHTML=reminders.map((r,i)=>`<button class="reminder-card ${r.enabled?'':'disabled'}" type="button" data-index="${i}"><span class="card-heading"><span class="card-icon">${r.icon}</span><span class="card-title">${safe(r.title)}</span></span><span class="card-message">${safe(r.message)}</span><span class="card-meta"><span class="status-dot"></span>${r.enabled?`${safe(r.time)} · ${repeatLabel(r.repeat)}`:'Paused'}</span></button>`).join('');list.querySelectorAll('.reminder-card').forEach(card=>card.addEventListener('click',()=>openEditor(Number(card.dataset.index))));updateSummary()}
    function openEditor(index){editing=index;const r=reminders[index];titleInput.value=r.title;messageInput.value=r.message;timeInput.value=r.time;repeatInput.value=r.repeat;enabledInput.checked=!!r.enabled;backdrop.classList.add('open');backdrop.setAttribute('aria-hidden','false')}
    function closeEditor(){backdrop.classList.remove('open');backdrop.setAttribute('aria-hidden','true');editing=-1}
    function apply(){if(editing<0)return;const title=titleInput.value.trim(),message=messageInput.value.trim();if(!title||!message||!timeInput.value){showToast('Please complete the title, message and time.');return}reminders[editing]={...reminders[editing],title,message,time:timeInput.value,repeat:repeatInput.value,enabled:enabledInput.checked};render();closeEditor();showToast('Reminder updated ✓')}
    function reset(){if(editing<0)return;const r=defaults[editing];titleInput.value=r.title;messageInput.value=r.message;timeInput.value=r.time;repeatInput.value=r.repeat;enabledInput.checked=r.enabled;showToast('Original reminder restored.')}
    function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(reminders));showToast('Smart reminders saved ✓');updateSummary()}
    function updateSummary(){const active=reminders.filter(r=>r.enabled);summary.textContent=active.length?`${active.length} smart reminder${active.length===1?' is':'s are'} active and saved privately on this device.`:'All reminders are paused. Tap a reminder to enable it.'}
    function showToast(message){clearTimeout(toastTimer);toast.textContent=message;toast.classList.add('show');toastTimer=setTimeout(()=>toast.classList.remove('show'),2300)}
    document.getElementById('closeButton').addEventListener('click',closeEditor);document.getElementById('applyButton').addEventListener('click',apply);document.getElementById('resetButton').addEventListener('click',reset);document.getElementById('saveButton').addEventListener('click',save);backdrop.addEventListener('click',event=>{if(event.target===backdrop)closeEditor()});render();
  </script>
</body>
</html>
