<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mood Tracker</title>

<style>
body{
    margin:0;
    background:#fdf7f9;
    font-family:Georgia, serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    width:340px;
    background:white;
    padding:30px;
    border-radius:30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
    text-align:center;
}

h1{
    font-style:italic;
    margin-bottom:10px;
}

.subtitle{
    color:#777;
    margin-bottom:25px;
}

.mood-btn{
    width:100%;
    padding:14px;
    margin:8px 0;
    border-radius:999px;
    border:1px solid #ddd;
    background:white;
    cursor:pointer;
    font-size:18px;
}

.result{
    margin-top:20px;
    font-size:18px;
    color:#444;
}.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    justify-content:center;
    align-items:center;
    z-index:1000;
}

.modal-content{
    background:white;
    padding:25px;
    border-radius:20px;
    width:90%;
    max-width:400px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.modal-content h3{
    margin-bottom:15px;
}

.modal-content textarea{
    width:100%;
    height:120px;
    padding:10px;
    border-radius:12px;
    border:1px solid #ddd;
    resize:none;
    font-size:16px;
}

.modal-content button{
    margin-top:12px;
    padding:12px 20px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
}
</style>
</head>

<body>

<div class="card">
    <h1>Mood Tracker</h1>
    <div class="subtitle">How are you feeling today?</div>

  <button class="mood-btn" onclick="openMoodModal('😊 Happy')">😊 Happy</button>

<button class="mood-btn" onclick="openMoodModal('😌 Calm')">😌 Calm</button>

<button class="mood-btn" onclick="openMoodModal('💪 Motivated')">💪 Motivated</button>

<button class="mood-btn" onclick="openMoodModal('😔 Sad')">😔 Sad</button>

<button class="mood-btn" onclick="openMoodModal('😴 Tired')">😴 Tired</button>

<button class="mood-btn" onclick="openMoodModal('😰 Stressed')">😰 Stressed</button>

<button class="mood-btn" onclick="openMoodModal('😟 Anxious')">😟 Anxious</button>

<button class="mood-btn" onclick="openMoodModal('😤 Frustrated')">😤 Frustrated</button>

<button class="mood-btn" onclick="openMoodModal('🤔 Confused')">🤔 Confused</button>

<button class="mood-btn" onclick="openMoodModal('✨ Inspired')">✨ Inspired</button>

<button class="mood-btn" onclick="openMoodModal('🎯 Focused')">🎯 Focused</button>

<button class="mood-btn" onclick="openMoodModal('🌟 Confident')">🌟 Confident</button>

<button class="mood-btn" onclick="openMoodModal('🌈 Optimistic')">🌈 Optimistic</button>

<button class="mood-btn" onclick="openMoodModal('❤️ Loved')">❤️ Loved</button>

<button class="mood-btn" onclick="openMoodModal('🏆 Accomplished')">🏆 Accomplished</button>

<button class="mood-btn" onclick="openMoodModal('🎉 Energized')">🎉 Energized</button>
<div id="moodModal" class="modal">
  <div class="modal-content">

    <h2 id="modalTitle">Mood Reflection</h2>

    <p>Why are you feeling this way today?</p>

    <textarea
      id="moodNote"
      placeholder="Write your thoughts here..."
    ></textarea>

    <div class="modal-buttons">

      <button onclick="saveMoodReflection()">
        Save Reflection
      </button>

      <button onclick="closeMoodModal()">
        Skip
      </button>

    </div>

  </div>
</div>

   <div class="modal" id="moodModal">
    <div class="modal-content">
        <h3 id="modalMoodTitle">Mood Reflection</h3>

        <textarea
            id="moodReflection"
            placeholder="Why did you choose this mood today?"
        ></textarea>

        <br>

        <button onclick="saveMoodReflection()">
            Save Reflection
        </button>

        <button onclick="closeMoodModal()">
            Skip
        </button>
    </div> 
   </div>
            <div class="result" id="result"></div>



<script>
function setMood(mood){

    let quote = "";
    let prompt = "";
    
if(mood.includes("Confident")){
    quote = "Believe in your abilities.";
    prompt = "What strength are you most proud of today?";
}

else if(mood.includes("Optimistic")){
    quote = "Every day brings new possibilities.";
    prompt = "What are you looking forward to?";
}

else if(mood.includes("Loved")){
    quote = "You are valued more than you know.";
    prompt = "Who made you feel appreciated today?";
}

else if(mood.includes("Accomplished")){
    quote = "Celebrate your progress.";
    prompt = "What achievement are you proud of today?";
}

else if(mood.includes("Energized")){
    quote = "Your energy can create amazing things.";
    prompt = "How will you use your energy today?";
}
    if(mood.includes("Happy")){
        quote = "Happiness grows when it is shared.";
        prompt = "What made you smile today?";
    }
    else if(mood.includes("Calm")){
        quote = "Peace begins with a quiet mind.";
        prompt = "What helped you feel peaceful today?";
    }
    else if(mood.includes("Motivated")){
        quote = "Small daily actions create big results.";
        prompt = "What goal are you excited to achieve?";
    }
    else if(mood.includes("Sad")){
        quote = "It's okay to feel your emotions.";
        prompt = "What would help you feel supported right now?";
    }
    else if(mood.includes("Tired")){
        quote = "Rest is productive too.";
        prompt = "What can you do today to recharge?";
    }
    else if(mood.includes("Stressed")){
        quote = "Take one breath at a time.";
        prompt = "What is one thing you can let go of today?";
    }

    document.getElementById("result").innerHTML =
        "<h3>" + mood + "</h3>" +
        "<p>" + quote + "</p>" +
        "<br><strong>Journal Prompt:</strong>" +
        "<p>" + prompt + "</p>";

    localStorage.setItem("todayMood", mood);
}

window.onload = function() {
    let savedMood = localStorage.getItem("todayMood");

    if(savedMood){
        setMood(savedMood);
    }

};

function openMoodModal(mood){
    document.getElementById("moodModal").style.display = "flex";
    document.getElementById("modalTitle").innerText = mood;
    localStorage.setItem("selectedMood", mood);
}

function closeMoodModal(){
    document.getElementById("moodModal").style.display = "none";
}

function saveMoodReflection(){
    let note = document.getElementById("moodNote").value;
    let mood = localStorage.getItem("selectedMood");

    localStorage.setItem("reflection_" + mood, note);

    setMood(mood);
    closeMoodModal();
}

</script>

</body>
</html>
