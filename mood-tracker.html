<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mood Tracker</title>

<style>
body{
    margin:0;
    background:#fdf7f9;
    font-family:Georgia, serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    width:340px;
    background:white;
    padding:30px;
    border-radius:30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
    text-align:center;
}

h1{
    font-style:italic;
    margin-bottom:10px;
}

.subtitle{
    color:#777;
    margin-bottom:25px;
}

.mood-btn{
    width:100%;
    padding:14px;
    margin:8px 0;
    border-radius:999px;
    border:1px solid #ddd;
    background:white;
    cursor:pointer;
    font-size:18px;
}

.result{
    margin-top:20px;
    font-size:18px;
    color:#444;
}
</style>
</head>

<body>

<div class="card">
    <h1>Mood Tracker</h1>
    <div class="subtitle">How are you feeling today?</div>

    <button class="mood-btn" onclick="setMood('😊 Happy')">😊 Happy</button>
    <button class="mood-btn" onclick="setMood('😌 Calm')">😌 Calm</button>
    <button class="mood-btn" onclick="setMood('💪 Motivated')">💪 Motivated</button>
    <button class="mood-btn" onclick="setMood('😔 Sad')">😔 Sad</button>
    <button class="mood-btn" onclick="setMood('😴 Tired')">😴 Tired</button>
    <button class="mood-btn" onclick="setMood('😰 Stressed')">😰 Stressed</button>
<button class="mood-btn" onclick="setMood('😴 Tired')">😴 Tired</button>
<button class="mood-btn" onclick="setMood('😰 Stressed')">😰 Stressed</button>

<button class="mood-btn" onclick="setMood('😰 Anxious')">😰 Anxious</button>
<button class="mood-btn" onclick="setMood('😤 Frustrated')">😤 Frustrated</button>
<button class="mood-btn" onclick="setMood('🤔 Confused')">🤔 Confused</button>
<button class="mood-btn" onclick="setMood('✨ Inspired')">✨ Inspired</button>
<button class="mood-btn" onclick="setMood('🎯 Focused')">🎯 Focused</button>


    <div class="result" id="result"></div>
</div>


<script>
function setMood(mood){

    let quote = "";
    let prompt = "";

    if(mood.includes("Happy")){
        quote = "Happiness grows when it is shared.";
        prompt = "What made you smile today?";
    }
    else if(mood.includes("Calm")){
        quote = "Peace begins with a quiet mind.";
        prompt = "What helped you feel peaceful today?";
    }
    else if(mood.includes("Motivated")){
        quote = "Small daily actions create big results.";
        prompt = "What goal are you excited to achieve?";
    }
    else if(mood.includes("Sad")){
        quote = "It's okay to feel your emotions.";
        prompt = "What would help you feel supported right now?";
    }
    else if(mood.includes("Tired")){
        quote = "Rest is productive too.";
        prompt = "What can you do today to recharge?";
    }
    else if(mood.includes("Stressed")){
        quote = "Take one breath at a time.";
        prompt = "What is one thing you can let go of today?";
    }

    document.getElementById("result").innerHTML =
        "<h3>" + mood + "</h3>" +
        "<p>" + quote + "</p>" +
        "<br><strong>Journal Prompt:</strong>" +
        "<p>" + prompt + "</p>";

    localStorage.setItem("todayMood", mood);
}

window.onload = function() {
    let savedMood = localStorage.getItem("todayMood");

    if(savedMood){
        setMood(savedMood);
    }
};

</script>

</body>
</html>
