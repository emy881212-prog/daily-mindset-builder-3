<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >

  <title>Export Journal</title>

  <link rel="stylesheet" href="performance.css">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --background-top: #f7f5f6;
      --background-bottom: #817e8c;

      --panel-light: #ead8da;
      --panel-dark: #c5adb0;

      --button-light: #efb5aa;
      --button-middle: #d9a099;
      --button-dark: #ae8985;

      --accent: #bd7f7a;
      --accent-dark: #8e6463;

      --dark: #151416;
      --soft-dark: #41353a;
      --white: #ffffff;
    }

    html {
      min-height: 100%;
      background: var(--background-bottom);
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;

      overflow-x: hidden;

      color: var(--dark);

      font-family:
        Inter,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;

      background:
        radial-gradient(
          circle at 25% 8%,
          rgba(255, 255, 255, 0.85),
          transparent 30%
        ),
        linear-gradient(
          180deg,
          var(--background-top) 0%,
          #ddd9df 39%,
          var(--background-bottom) 100%
        );
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      touch-action: manipulation;
    }

    /* =================================
       ANIMATED WHITE BUBBLES
    ================================= */

    .bubbles {
      position: fixed;
      inset: 0;
      z-index: 0;

      overflow: hidden;
      pointer-events: none;
    }

    .bubble {
      position: absolute;
      bottom: -55px;

      width: var(--size);
      height: var(--size);

      border: 1px solid rgba(255, 255, 255, 0.45);
      border-radius: 50%;

      background: rgba(255, 255, 255, 0.11);

      box-shadow:
        inset 0 0 12px rgba(255, 255, 255, 0.28),
        0 4px 17px rgba(255, 255, 255, 0.08);

      animation: rise var(--duration) linear infinite;
      animation-delay: var(--delay);
    }

    .bubble:nth-child(1) {
      left: 7%;
      --size: 18px;
      --duration: 17s;
      --delay: -4s;
    }

    .bubble:nth-child(2) {
      left: 24%;
      --size: 11px;
      --duration: 14s;
      --delay: -9s;
    }

    .bubble:nth-child(3) {
      left: 43%;
      --size: 25px;
      --duration: 21s;
      --delay: -13s;
    }

    .bubble:nth-child(4) {
      left: 63%;
      --size: 15px;
      --duration: 16s;
      --delay: -6s;
    }

    .bubble:nth-child(5) {
      left: 79%;
      --size: 21px;
      --duration: 19s;
      --delay: -11s;
    }

    .bubble:nth-child(6) {
      left: 92%;
      --size: 12px;
      --duration: 15s;
      --delay: -7s;
    }

    @keyframes rise {
      0% {
        transform: translate3d(0, 0, 0);
        opacity: 0;
      }

      12% {
        opacity: 0.7;
      }

      50% {
        transform: translate3d(11px, -55vh, 0);
      }

      100% {
        transform: translate3d(-8px, -115vh, 0);
        opacity: 0;
      }
    }

    /* =================================
       MAIN APP
    ================================= */

    .app {
      position: relative;
      z-index: 1;

      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      min-height: 100dvh;

      margin: 0 auto;

      padding:
        max(12px, env(safe-area-inset-top))
        20px
        max(24px, env(safe-area-inset-bottom));
    }

    /* =================================
       HEADER
    ================================= */

    .header {
      display: flex;
      align-items: center;
      gap: 12px;

      margin-bottom: 10px;
    }

    .logo-button {
      display: grid;
      place-items: center;

      width: 55px;
      min-width: 55px;
      height: 55px;

      border: 10px solid rgba(255, 255, 255, 0.94);
      border-radius: 50%;

      color: white;
      background: #17181c;

      box-shadow:
        0 3px 8px rgba(0, 0, 0, 0.18),
        inset 0 0 0 1px rgba(255, 255, 255, 0.06);
    }

    .logo-symbol {
      font-size: 25px;
      line-height: 1;
      pointer-events: none;
    }

    .brand-name {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 16px;
      font-weight: 500;
    }

    /* =================================
       TITLE
    ================================= */

    .title-wrapper {
      display: flex;
      justify-content: center;

      width: 100%;
      margin: 0 auto 12px;
    }

    .title-box {
      width: fit-content;
      max-width: 95%;

      padding: 8px 27px;

      text-align: center;

      background: rgba(255, 255, 255, 0.7);

      box-shadow:
        0 7px 22px rgba(77, 70, 77, 0.06);
    }

    .page-title {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(31px, 8.7vw, 39px);
      font-weight: 500;
      line-height: 1;
      letter-spacing: -1.3px;
    }

    .page-subtitle {
      margin-top: 6px;

      font-family: Georgia, "Times New Roman", serif;
      font-size: 13px;

      color: rgba(43, 37, 40, 0.58);
    }

    /* =================================
       MAIN PINK PANEL
    ================================= */

    .export-panel {
      min-height: 682px;

      padding: 78px 14px 43px;

      border: 2px solid rgba(177, 112, 112, 0.5);
      border-radius: 66px;

      background:
        radial-gradient(
          circle at 50% 7%,
          rgba(255, 255, 255, 0.23),
          transparent 34%
        ),
        linear-gradient(
          145deg,
          var(--panel-light),
          var(--panel-dark)
        );

      box-shadow:
        0 13px 23px rgba(45, 38, 48, 0.29),
        inset 5px 5px 14px rgba(255, 255, 255, 0.23),
        inset -7px -7px 15px rgba(104, 75, 84, 0.15);
    }

    .export-buttons {
      display: flex;
      flex-direction: column;
      gap: 36px;
    }

    /* =================================
       FULLY CLICKABLE BUTTONS
    ================================= */

    .export-button {
      position: relative;

      display: flex;
      align-items: center;
      justify-content: center;

      width: 100%;
      min-height: 132px;

      padding: 18px 29px;

      border: 1.5px solid #171517;
      border-radius: 999px;

      color: var(--dark);

      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(21px, 5.7vw, 26px);
      line-height: 1.18;
      text-align: center;

      background:
        linear-gradient(
          100deg,
          var(--button-light) 0%,
          var(--button-middle) 52%,
          var(--button-dark) 100%
        );

      box-shadow:
        0 12px 10px rgba(61, 49, 57, 0.37),
        inset 3px 3px 5px rgba(255, 255, 255, 0.32),
        inset -4px -4px 8px rgba(83, 56, 57, 0.18);

      transition:
        transform 160ms ease,
        box-shadow 160ms ease,
        filter 160ms ease;
    }

    .export-button:hover {
      filter: brightness(1.035);
    }

    .export-button:active {
      transform: translateY(4px) scale(0.986);

      box-shadow:
        0 6px 7px rgba(61, 49, 57, 0.31),
        inset 2px 2px 5px rgba(90, 59, 63, 0.14);
    }

    .button-content,
    .button-icon,
    .button-label,
    .button-description {
      pointer-events: none;
    }

    .button-content {
      display: block;
      max-width: 260px;
    }

    .button-icon {
      display: block;

      margin-bottom: 6px;

      font-size: 29px;
    }

    .button-label {
      display: block;
    }

    .button-description {
      display: block;

      margin-top: 5px;

      font-family:
        Inter,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;

      font-size: 11px;
      line-height: 1.35;

      color: rgba(51, 40, 45, 0.62);
    }

    /* =================================
       MAIN SAVE BUTTON
    ================================= */

    .main-save-button {
      display: block;

      width: 73%;
      min-height: 56px;

      margin: 21px auto 0;

      border: 1.5px solid var(--dark);
      border-radius: 999px;

      color: var(--dark);
      background: #e1e1e1;

      font-family: Georgia, "Times New Roman", serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.8px;

      box-shadow:
        0 7px 8px rgba(34, 30, 38, 0.35),
        inset 2px 2px 4px rgba(255, 255, 255, 0.78);

      transition:
        transform 160ms ease,
        box-shadow 160ms ease;
    }

    .main-save-button:active {
      transform: translateY(3px);
    }

    /* =================================
       MODAL
    ================================= */

    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;

      display: flex;
      align-items: flex-end;
      justify-content: center;

      padding: 13px;

      visibility: hidden;
      opacity: 0;

      background: rgba(27, 22, 29, 0.56);

      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);

      transition:
        opacity 230ms ease,
        visibility 230ms ease;
    }

    .modal-overlay.open {
      visibility: visible;
      opacity: 1;
    }

    .export-modal {
      width: 100%;
      max-width: 430px;

      max-height: calc(100vh - 26px);
      max-height: calc(100dvh - 26px);

      overflow-y: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;

      padding:
        17px
        17px
        max(23px, env(safe-area-inset-bottom));

      border: 1px solid rgba(255, 255, 255, 0.82);
      border-radius: 35px 35px 28px 28px;

      background:
        radial-gradient(
          circle at 10% 3%,
          rgba(255, 255, 255, 0.98),
          transparent 27%
        ),
        linear-gradient(
          150deg,
          rgba(255, 250, 250, 0.99),
          rgba(232, 205, 208, 0.99)
        );

      box-shadow:
        0 -13px 45px rgba(26, 21, 28, 0.36),
        inset 0 1px 0 rgba(255, 255, 255, 0.95);

      transform: translate3d(0, 105%, 0);

      transition:
        transform 300ms cubic-bezier(0.22, 0.82, 0.32, 1);
    }

    .modal-overlay.open .export-modal {
      transform: translate3d(0, 0, 0);
    }

    .modal-handle {
      width: 53px;
      height: 5px;

      margin: 0 auto 17px;

      border-radius: 999px;

      background: rgba(61, 47, 53, 0.23);
    }

    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 15px;
    }

    .modal-label {
      margin-bottom: 4px;

      font-size: 11px;
      font-weight: 800;
      letter-spacing: 1.6px;
      text-transform: uppercase;

      color: var(--accent-dark);
    }

    .modal-title {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 30px;
      font-weight: 500;
      line-height: 1.06;
      letter-spacing: -1px;
    }

    .modal-description {
      margin-top: 6px;

      font-size: 12px;
      line-height: 1.45;

      color: rgba(51, 41, 46, 0.58);
    }

    .close-button {
      display: grid;
      place-items: center;

      width: 42px;
      min-width: 42px;
      height: 42px;

      border: 1px solid rgba(76, 55, 62, 0.18);
      border-radius: 50%;

      color: var(--soft-dark);
      background: rgba(255, 255, 255, 0.65);

      font-size: 23px;

      box-shadow:
        0 5px 13px rgba(72, 52, 60, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.91);
    }

    .modal-content {
      margin-top: 20px;
    }

    /* =================================
       INFORMATION CARDS
    ================================= */

    .information-card {
      padding: 16px;

      border: 1px solid rgba(116, 79, 87, 0.14);
      border-radius: 23px;

      background:
        linear-gradient(
          145deg,
          rgba(255, 255, 255, 0.72),
          rgba(239, 211, 213, 0.69)
        );

      box-shadow:
        0 8px 21px rgba(93, 62, 70, 0.08);
    }

    .information-heading {
      display: flex;
      align-items: center;
      gap: 11px;
    }

    .information-icon {
      display: grid;
      place-items: center;

      width: 44px;
      min-width: 44px;
      height: 44px;

      border-radius: 15px;

      font-size: 23px;

      background:
        linear-gradient(
          145deg,
          #efb7ad,
          #b78684
        );
    }

    .information-title {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 19px;
      font-weight: 600;
    }

    .information-text {
      margin-top: 11px;

      font-size: 12px;
      line-height: 1.55;

      color: rgba(58, 45, 51, 0.68);
    }

    .journal-counts {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 9px;

      margin-top: 14px;
    }

    .count-card {
      padding: 12px 10px;

      border-radius: 17px;

      text-align: center;

      background: rgba(255, 255, 255, 0.61);
    }

    .count-number {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 24px;
      font-weight: 700;
    }

    .count-label {
      margin-top: 3px;

      font-size: 10px;
      color: rgba(57, 43, 49, 0.55);
    }

    /* =================================
       FORMAT OPTIONS
    ================================= */

    .section-title {
      margin: 18px 0 10px;

      font-family: Georgia, "Times New Roman", serif;
      font-size: 18px;
      font-weight: 600;
    }

    .format-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .format-option {
      position: relative;

      display: block;

      cursor: pointer;
    }

    .format-option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .format-card {
      display: grid;
      place-items: center;

      min-height: 91px;
      padding: 10px 7px;

      border: 1px solid rgba(112, 76, 84, 0.16);
      border-radius: 19px;

      text-align: center;

      background: rgba(255, 255, 255, 0.61);

      transition:
        transform 150ms ease,
        background 150ms ease,
        box-shadow 150ms ease;
    }

    .format-option input:checked + .format-card {
      color: white;

      background:
        linear-gradient(
          145deg,
          #cb8c86,
          #916968
        );

      box-shadow:
        0 7px 16px rgba(99, 64, 70, 0.24);
    }

    .format-option:active .format-card {
      transform: scale(0.97);
    }

    .format-icon {
      font-size: 24px;
      pointer-events: none;
    }

    .format-name {
      margin-top: 6px;

      font-size: 12px;
      font-weight: 800;

      pointer-events: none;
    }

    /* =================================
       CATEGORY OPTIONS
    ================================= */

    .category-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .category-option {
      position: relative;

      display: block;

      cursor: pointer;
    }

    .category-option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .category-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;

      min-height: 50px;
      padding: 10px 14px;

      border: 1px solid rgba(112, 76, 84, 0.14);
      border-radius: 17px;

      color: #45373d;
      background: rgba(255, 255, 255, 0.62);
    }

    .category-name,
    .category-check {
      pointer-events: none;
    }

    .category-name {
      font-size: 13px;
      font-weight: 700;
    }

    .category-check {
      display: grid;
      place-items: center;

      width: 25px;
      height: 25px;

      border: 1px solid rgba(93, 65, 72, 0.2);
      border-radius: 9px;

      color: transparent;
      background: rgba(255, 255, 255, 0.75);
    }

    .category-option input:checked + .category-card {
      background: rgba(232, 193, 192, 0.65);
    }

    .category-option input:checked +
    .category-card
    .category-check {
      color: white;
      background: #9d706e;
    }

    /* =================================
       DATE RANGE
    ================================= */

    .date-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 9px;
    }

    .date-field label {
      display: block;

      margin-bottom: 6px;

      font-family: Georgia, "Times New Roman", serif;
      font-size: 13px;
      font-weight: 600;
    }

    .date-input {
      width: 100%;
      min-height: 47px;

      padding: 10px 11px;

      border: 1px solid rgba(111, 75, 83, 0.17);
      border-radius: 15px;
      outline: none;

      color: #2d2529;
      background: rgba(255, 255, 255, 0.82);

      font-size: 12px;
    }

    .date-input:focus {
      border-color: rgba(174, 107, 106, 0.52);

      box-shadow:
        0 0 0 4px rgba(202, 133, 132, 0.11);
    }

    /* =================================
       PREVIEW
    ================================= */

    .preview-card {
      margin-top: 14px;
      padding: 15px;

      border: 1px solid rgba(112, 76, 84, 0.14);
      border-radius: 20px;

      background: rgba(255, 255, 255, 0.59);
    }

    .preview-title {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 17px;
      font-weight: 600;
    }

    .preview-text {
      margin-top: 7px;

      font-size: 11px;
      line-height: 1.55;

      color: rgba(57, 43, 49, 0.65);
    }

    /* =================================
       MODAL BUTTONS
    ================================= */

    .modal-actions {
      display: grid;
      grid-template-columns: 0.82fr 1.18fr;
      gap: 9px;

      margin-top: 19px;
    }

    .modal-action {
      min-height: 54px;

      padding: 10px 14px;

      border-radius: 999px;

      font-size: 14px;
      font-weight: 800;

      transition:
        transform 150ms ease,
        box-shadow 150ms ease;
    }

    .modal-action:active {
      transform: translateY(2px) scale(0.985);
    }

    .exit-button {
      border: 1px solid rgba(67, 50, 56, 0.21);

      color: #46383d;
      background: rgba(255, 255, 255, 0.69);

      box-shadow:
        0 5px 12px rgba(63, 45, 52, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.88);
    }

    .export-now-button {
      color: white;

      background:
        linear-gradient(
          110deg,
          #c78a84,
          #916968
        );

      box-shadow:
        0 7px 16px rgba(99, 64, 70, 0.26),
        inset 0 1px 0 rgba(255, 255, 255, 0.3);
    }

    /* =================================
       TOAST
    ================================= */

    .toast {
      position: fixed;
      left: 50%;
      bottom: max(25px, env(safe-area-inset-bottom));
      z-index: 2000;

      width: max-content;
      max-width: calc(100% - 34px);

      padding: 13px 20px;

      border-radius: 999px;

      color: white;
      background: rgba(32, 27, 33, 0.92);

      font-size: 14px;
      font-weight: 700;
      text-align: center;

      opacity: 0;
      pointer-events: none;

      transform: translate(-50%, 24px);

      transition:
        opacity 220ms ease,
        transform 220ms ease;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    button:focus-visible,
    input:focus-visible {
      outline: 3px solid rgba(255, 255, 255, 0.95);
      outline-offset: 3px;
    }

    @media (max-width: 370px) {
      .app {
        padding-left: 14px;
        padding-right: 14px;
      }

      .export-panel {
        min-height: 640px;
        padding-left: 11px;
        padding-right: 11px;
        border-radius: 57px;
      }

      .export-button {
        min-height: 124px;
        font-size: 20px;
      }

      .format-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (min-width: 600px) {
      .modal-overlay {
        align-items: center;
      }

      .export-modal {
        border-radius: 35px;

        transform:
          translate3d(0, 25px, 0)
          scale(0.97);
      }

      .modal-overlay.open .export-modal {
        transform:
          translate3d(0, 0, 0)
          scale(1);
      }
    }
  </style>
</head>

<body>

  <div class="bubbles" aria-hidden="true">
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>
  </div>

  <main class="app">

    <header class="header">

      <button
        class="logo-button"
        id="backToJournalButton"
        type="button"
        aria-label="Return to journal menu"
      >
        <span class="logo-symbol">✦</span>
      </button>

      <p class="brand-name">
        Daily Mindset Builder
      </p>

    </header>

    <div class="title-wrapper">

      <div class="title-box">

        <h1 class="page-title">
          Export Journal
        </h1>

        <p class="page-subtitle">
          Keep a private copy of your personal journey
        </p>

      </div>

    </div>

    <section class="export-panel">

      <div class="export-buttons">

        <button
          class="export-button"
          type="button"
          data-view="complete"
        >
          <span class="button-content">

            <span class="button-icon">📖</span>

            <span class="button-label">
              Complete Journal Export
            </span>

            <span class="button-description">
              Export your reflections, gratitude, goals and history
            </span>

          </span>
        </button>

        <button
          class="export-button"
          type="button"
          data-view="range"
        >
          <span class="button-content">

            <span class="button-icon">📅</span>

            <span class="button-label">
              Date Range Export
            </span>

            <span class="button-description">
              Choose specific dates and journal sections
            </span>

          </span>
        </button>

        <button
          class="export-button"
          type="button"
          data-view="backup"
        >
          <span class="button-content">

            <span class="button-icon">🔐</span>

            <span class="button-label">
              Private Journal Backup
            </span>

            <span class="button-description">
              Create a secure copy of all saved journal information
            </span>

          </span>
        </button>

      </div>

    </section>

    <button
      class="main-save-button"
      id="savePreferencesButton"
      type="button"
    >
      SAVE
    </button>

  </main>

  <!-- Export window -->

  <div
    class="modal-overlay"
    id="modalOverlay"
    aria-hidden="true"
  >

    <section
      class="export-modal"
      id="exportModal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modalTitle"
    >

      <div class="modal-handle"></div>

      <div class="modal-header">

        <div>

          <p
            class="modal-label"
            id="modalLabel"
          >
            Journal export
          </p>

          <h2
            class="modal-title"
            id="modalTitle"
          >
            Complete Journal Export
          </h2>

          <p
            class="modal-description"
            id="modalDescription"
          >
            Choose how you would like to save your journal.
          </p>

        </div>

        <button
          class="close-button"
          id="closeButton"
          type="button"
          aria-label="Exit export window"
        >
          ×
        </button>

      </div>

      <div
        class="modal-content"
        id="modalContent"
      ></div>

      <div class="modal-actions">

        <button
          class="modal-action exit-button"
          id="exitButton"
          type="button"
        >
          Exit
        </button>

        <button
          class="modal-action export-now-button"
          id="exportNowButton"
          type="button"
        >
          Save &amp; Export
        </button>

      </div>

    </section>

  </div>

  <div
    class="toast"
    id="toast"
    role="status"
    aria-live="polite"
  >
    Export settings saved ✓
  </div>

  <script>
    const exportStorageSources = {
      mood: {
        key: "dailyMindsetJournalEntry",
        title: "Mood Tracker",
        icon: "😊"
      },

      gratitude: {
        key: "dailyMindsetGratitudeJournal",
        title: "Gratitude Journal",
        icon: "🤍"
      },

      goals: {
        key: "dailyMindsetGoalsAndDreams",
        title: "Goals & Dreams",
        icon: "🎯"
      },

      reflection: {
        key: "dailyMindsetDailyReflection",
        title: "Daily Reflection",
        icon: "🪞"
      },

      history: {
        key: "dailyMindsetJournalHistory",
        title: "Journal History",
        icon: "📅"
      },

      quotes: {
        key: "dailyMindsetSavedQuotes",
        title: "Saved Quotes",
        icon: "💬"
      }
    };

    const preferencesStorageKey =
      "dailyMindsetExportPreferences";

    const modalOverlay =
      document.getElementById("modalOverlay");

    const exportModal =
      document.getElementById("exportModal");

    const modalLabel =
      document.getElementById("modalLabel");

    const modalTitle =
      document.getElementById("modalTitle");

    const modalDescription =
      document.getElementById("modalDescription");

    const modalContent =
      document.getElementById("modalContent");

    const closeButton =
      document.getElementById("closeButton");

    const exitButton =
      document.getElementById("exitButton");

    const exportNowButton =
      document.getElementById("exportNowButton");

    const savePreferencesButton =
      document.getElementById("savePreferencesButton");

    const backToJournalButton =
      document.getElementById("backToJournalButton");

    const exportButtons =
      document.querySelectorAll(".export-button");

    const toast =
      document.getElementById("toast");

    let currentView = "complete";
    let toastTimer;

    let exportPreferences = {
      format: "txt",

      categories: [
        "mood",
        "gratitude",
        "goals",
        "reflection",
        "history",
        "quotes"
      ],

      startDate: "",
      endDate: ""
    };

    function safeReadJSON(key) {
      try {
        const storedValue =
          localStorage.getItem(key);

        return storedValue
          ? JSON.parse(storedValue)
          : null;
      } catch (error) {
        console.error(
          `Could not read ${key}:`,
          error
        );

        return null;
      }
    }

    function loadPreferences() {
      const savedPreferences =
        safeReadJSON(preferencesStorageKey);

      if (!savedPreferences) {
        return;
      }

      exportPreferences = {
        ...exportPreferences,
        ...savedPreferences
      };
    }

    function savePreferences() {
      try {
        localStorage.setItem(
          preferencesStorageKey,
          JSON.stringify(exportPreferences)
        );

        showToast("Export settings saved ✓");
      } catch (error) {
        console.error(
          "Could not save export settings:",
          error
        );

        showToast(
          "Export settings could not be saved"
        );
      }
    }

    function collectJournalData() {
      const journalData = {
        exportedAt:
          new Date().toISOString(),

        app:
          "Daily Mindset Builder",

        sections: {}
      };

      Object.entries(
        exportStorageSources
      ).forEach(([category, information]) => {
        const savedData =
          safeReadJSON(information.key);

        if (savedData !== null) {
          journalData.sections[category] = {
            title: information.title,
            icon: information.icon,
            data: savedData
          };
        }
      });

      return journalData;
    }

    function getSectionCount(data) {
      return Object.keys(
        data.sections || {}
      ).length;
    }

    function getEntryCount(data) {
      let count = 0;

      Object.values(
        data.sections || {}
      ).forEach((section) => {
        if (Array.isArray(section.data)) {
          count += section.data.length;
        } else if (
          section.data &&
          typeof section.data === "object"
        ) {
          count += Object.values(
            section.data
          ).filter((value) => {
            return (
              typeof value === "string" &&
              value.trim()
            ) || (
              value &&
              typeof value === "object"
            );
          }).length;
        }
      });

      return count;
    }

    function openExportWindow(view) {
      currentView = view;

      if (view === "complete") {
        modalLabel.textContent =
          "Complete journal copy";

        modalTitle.textContent =
          "Complete Journal Export";

        modalDescription.textContent =
          "Save all available journal sections in your preferred format.";

        renderCompleteExport();
      }

      if (view === "range") {
        modalLabel.textContent =
          "Custom journal export";

        modalTitle.textContent =
          "Date Range Export";

        modalDescription.textContent =
          "Choose dates, sections and a file format.";

        renderDateRangeExport();
      }

      if (view === "backup") {
        modalLabel.textContent =
          "Private journal protection";

        modalTitle.textContent =
          "Private Journal Backup";

        modalDescription.textContent =
          "Create a complete JSON backup of your locally saved journal.";

        renderBackupExport();
      }

      modalOverlay.classList.add("open");

      modalOverlay.setAttribute(
        "aria-hidden",
        "false"
      );

      document.body.style.overflow =
        "hidden";
    }

    function closeExportWindow() {
      modalOverlay.classList.remove("open");

      modalOverlay.setAttribute(
        "aria-hidden",
        "true"
      );

      document.body.style.overflow = "";
    }

    function createFormatOptions() {
      const formats = [
        {
          value: "txt",
          icon: "📝",
          label: "Text"
        },
        {
          value: "json",
          icon: "💾",
          label: "Backup"
        },
        {
          value: "pdf",
          icon: "📄",
          label: "PDF"
        }
      ];

      return `
        <div class="format-grid">

          ${formats.map((format) => {
            return `
              <label class="format-option">

                <input
                  type="radio"
                  name="exportFormat"
                  value="${format.value}"
                  ${
                    exportPreferences.format ===
                    format.value
                      ? "checked"
                      : ""
                  }
                >

                <span class="format-card">

                  <span class="format-icon">
                    ${format.icon}
                  </span>

                  <span class="format-name">
                    ${format.label}
                  </span>

                </span>

              </label>
            `;
          }).join("")}

        </div>
      `;
    }

    function createCategoryOptions() {
      return `
        <div class="category-list">

          ${Object.entries(
            exportStorageSources
          ).map(([category, information]) => {
            const checked =
              exportPreferences.categories
                .includes(category);

            return `
              <label class="category-option">

                <input
                  type="checkbox"
                  name="exportCategory"
                  value="${category}"
                  ${checked ? "checked" : ""}
                >

                <span class="category-card">

                  <span class="category-name">
                    ${information.icon}
                    ${information.title}
                  </span>

                  <span class="category-check">
                    ✓
                  </span>

                </span>

              </label>
            `;
          }).join("")}

        </div>
      `;
    }

    function renderCompleteExport() {
      const data =
        collectJournalData();

      modalContent.innerHTML = `
        <section class="information-card">

          <div class="information-heading">

            <div class="information-icon">
              📚
            </div>

            <div>
              <h3 class="information-title">
                Your complete journal
              </h3>
            </div>

          </div>

          <p class="information-text">
            Your export can include mood entries,
            gratitude, goals, reflections, calendar
            history and saved quotes.
          </p>

          <div class="journal-counts">

            <div class="count-card">
              <div class="count-number">
                ${getSectionCount(data)}
              </div>

              <div class="count-label">
                Available sections
              </div>
            </div>

            <div class="count-card">
              <div class="count-number">
                ${getEntryCount(data)}
              </div>

              <div class="count-label">
                Saved items
              </div>
            </div>

          </div>

        </section>

        <h3 class="section-title">
          Choose export format
        </h3>

        ${createFormatOptions()}

        <h3 class="section-title">
          Include journal sections
        </h3>

        ${createCategoryOptions()}

        <div class="preview-card">

          <h3 class="preview-title">
            Your privacy
          </h3>

          <p class="preview-text">
            The export is created directly on your
            device. Your journal is not uploaded to
            another website by this export page.
          </p>

        </div>
      `;

      connectPreferenceInputs();
    }

    function renderDateRangeExport() {
      modalContent.innerHTML = `
        <section class="information-card">

          <div class="information-heading">

            <div class="information-icon">
              📅
            </div>

            <div>
              <h3 class="information-title">
                Choose your journal period
              </h3>
            </div>

          </div>

          <p class="information-text">
            Date filtering works best with Journal
            History entries and sections containing
            saved dates.
          </p>

        </section>

        <h3 class="section-title">
          Select dates
        </h3>

        <div class="date-grid">

          <div class="date-field">

            <label for="startDate">
              Start date
            </label>

            <input
              class="date-input"
              id="startDate"
              type="date"
              value="${exportPreferences.startDate}"
            >

          </div>

          <div class="date-field">

            <label for="endDate">
              End date
            </label>

            <input
              class="date-input"
              id="endDate"
              type="date"
              value="${exportPreferences.endDate}"
            >

          </div>

        </div>

        <h3 class="section-title">
          Choose export format
        </h3>

        ${createFormatOptions()}

        <h3 class="section-title">
          Include sections
        </h3>

        ${createCategoryOptions()}
      `;

      connectPreferenceInputs();

      document
        .getElementById("startDate")
        .addEventListener("change", (event) => {
          exportPreferences.startDate =
            event.target.value;
        });

      document
        .getElementById("endDate")
        .addEventListener("change", (event) => {
          exportPreferences.endDate =
            event.target.value;
        });
    }

    function renderBackupExport() {
      const data =
        collectJournalData();

      exportPreferences.format = "json";

      modalContent.innerHTML = `
        <section class="information-card">

          <div class="information-heading">

            <div class="information-icon">
              🔐
            </div>

            <div>
              <h3 class="information-title">
                Full private backup
              </h3>
            </div>

          </div>

          <p class="information-text">
            This creates a JSON backup containing all
            available Daily Mindset Builder journal
            information stored on this device.
          </p>

          <div class="journal-counts">

            <div class="count-card">
              <div class="count-number">
                ${getSectionCount(data)}
              </div>

              <div class="count-label">
                Sections protected
              </div>
            </div>

            <div class="count-card">
              <div class="count-number">
                ${getEntryCount(data)}
              </div>

              <div class="count-label">
                Saved items
              </div>
            </div>

          </div>

        </section>

        <div class="preview-card">

          <h3 class="preview-title">
            Backup recommendation
          </h3>

          <p class="preview-text">
            Keep the backup file in a private folder.
            The file can contain personal reflections,
            moods, goals and saved quotes.
          </p>

        </div>
      `;
    }

    function connectPreferenceInputs() {
      document
        .querySelectorAll(
          'input[name="exportFormat"]'
        )
        .forEach((input) => {
          input.addEventListener(
            "change",
            () => {
              exportPreferences.format =
                input.value;
            }
          );
        });

      document
        .querySelectorAll(
          'input[name="exportCategory"]'
        )
        .forEach((input) => {
          input.addEventListener(
            "change",
            () => {
              exportPreferences.categories =
                Array.from(
                  document.querySelectorAll(
                    'input[name="exportCategory"]:checked'
                  )
                ).map((checkedInput) => {
                  return checkedInput.value;
                });
            }
          );
        });
    }

    function filterSelectedSections(data) {
      const filteredSections = {};

      exportPreferences.categories
        .forEach((category) => {
          if (data.sections[category]) {
            filteredSections[category] =
              data.sections[category];
          }
        });

      return {
        ...data,
        sections: filteredSections
      };
    }

    function dateIsInsideRange(dateValue) {
      if (
        !exportPreferences.startDate &&
        !exportPreferences.endDate
      ) {
        return true;
      }

      if (!dateValue) {
        return true;
      }

      const date =
        String(dateValue).slice(0, 10);

      if (
        exportPreferences.startDate &&
        date < exportPreferences.startDate
      ) {
        return false;
      }

      if (
        exportPreferences.endDate &&
        date > exportPreferences.endDate
      ) {
        return false;
      }

      return true;
    }

    function filterByDate(data) {
      if (currentView !== "range") {
        return data;
      }

      const filteredData =
        structuredCloneSafe(data);

      Object.values(
        filteredData.sections
      ).forEach((section) => {
        if (Array.isArray(section.data)) {
          section.data =
            section.data.filter((item) => {
              return dateIsInsideRange(
                item.date ||
                item.createdAt ||
                item.lastSaved
              );
            });

          return;
        }

        if (
          section.data &&
          typeof section.data === "object"
        ) {
          const savedDate =
            section.data.date ||
            section.data.createdAt ||
            section.data.lastSaved;

          if (
            savedDate &&
            !dateIsInsideRange(savedDate)
          ) {
            section.data = {};
          }
        }
      });

      return filteredData;
    }

    function structuredCloneSafe(value) {
      return JSON.parse(
        JSON.stringify(value)
      );
    }

    function formatValueForText(
      value,
      indentation = 0
    ) {
      const space = " ".repeat(indentation);

      if (
        value === null ||
        value === undefined ||
        value === ""
      ) {
        return "";
      }

      if (typeof value === "string") {
        return `${space}${value}`;
      }

      if (
        typeof value === "number" ||
        typeof value === "boolean"
      ) {
        return `${space}${String(value)}`;
      }

      if (Array.isArray(value)) {
        return value
          .map((item, index) => {
            return (
              `${space}${index + 1}.\n` +
              formatValueForText(
                item,
                indentation + 2
              )
            );
          })
          .join("\n\n");
      }

      if (typeof value === "object") {
        return Object.entries(value)
          .map(([key, item]) => {
            const readableKey =
              key
                .replace(/([A-Z])/g, " $1")
                .replace(/^./, (letter) => {
                  return letter.toUpperCase();
                });

            const formattedValue =
              formatValueForText(
                item,
                indentation + 2
              );

            if (!formattedValue) {
              return "";
            }

            return (
              `${space}${readableKey}:\n` +
              formattedValue
            );
          })
          .filter(Boolean)
          .join("\n\n");
      }

      return "";
    }

    function createTextExport(data) {
      const sectionText =
        Object.values(data.sections)
          .map((section) => {
            return [
              "================================",
              `${section.icon} ${section.title}`,
              "================================",
              formatValueForText(section.data)
            ].join("\n");
          })
          .join("\n\n\n");

      return [
        "DAILY MINDSET BUILDER",
        "PERSONAL JOURNAL EXPORT",
        "",
        `Exported: ${new Date().toLocaleString()}`,
        "",
        sectionText || "No saved journal entries were found."
      ].join("\n");
    }

    function downloadFile(
      content,
      filename,
      mimeType
    ) {
      const blob =
        new Blob(
          [content],
          {
            type: mimeType
          }
        );

      const link =
        document.createElement("a");

      const objectURL =
        URL.createObjectURL(blob);

      link.href = objectURL;
      link.download = filename;

      document.body.appendChild(link);

      link.click();
      link.remove();

      setTimeout(() => {
        URL.revokeObjectURL(objectURL);
      }, 1000);
    }

    function exportAsText(data) {
      downloadFile(
        createTextExport(data),
        createFilename("txt"),
        "text/plain;charset=utf-8"
      );
    }

    function exportAsJSON(data) {
      downloadFile(
        JSON.stringify(data, null, 2),
        createFilename("json"),
        "application/json;charset=utf-8"
      );
    }

    function exportAsPrintablePDF(data) {
      const text =
        createTextExport(data);

      const printWindow =
        window.open(
          "",
          "_blank",
          "width=850,height=900"
        );

      if (!printWindow) {
        showToast(
          "Please allow pop-ups to create the PDF"
        );

        return;
      }

      const safeText =
        escapeHTML(text);

      printWindow.document.write(`
        <!DOCTYPE html>
        <html lang="en">
        <head>
          <meta charset="UTF-8">

          <title>Daily Mindset Builder Journal</title>

          <style>
            body {
              max-width: 800px;
              margin: 0 auto;
              padding: 45px;
              color: #272126;
              background: white;
              font-family: Georgia, serif;
            }

            h1 {
              margin-bottom: 8px;
              font-size: 34px;
              text-align: center;
            }

            .subtitle {
              margin-bottom: 30px;
              color: #786970;
              text-align: center;
            }

            pre {
              white-space: pre-wrap;
              word-wrap: break-word;
              font-family: Georgia, serif;
              font-size: 14px;
              line-height: 1.65;
            }

            @media print {
              body {
                padding: 0;
              }
            }
          </style>
        </head>

        <body>

          <h1>Daily Mindset Builder</h1>

          <p class="subtitle">
            Personal Journal Export
          </p>

          <pre>${safeText}</pre>

          <script>
            window.onload = function () {
              window.print();
            };
          <\/script>

        </body>
        </html>
      `);

      printWindow.document.close();
    }

    function createFilename(extension) {
      const date =
        new Date()
          .toISOString()
          .slice(0, 10);

      return (
        `daily-mindset-journal-${date}.` +
        extension
      );
    }

    function escapeHTML(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function startExport() {
      if (
        !exportPreferences.categories.length &&
        currentView !== "backup"
      ) {
        showToast(
          "Select at least one journal section"
        );

        return;
      }

      let data =
        collectJournalData();

      if (currentView !== "backup") {
        data =
          filterSelectedSections(data);
      }

      data =
        filterByDate(data);

      if (currentView === "backup") {
        exportPreferences.format = "json";
      }

      savePreferences();

      if (exportPreferences.format === "txt") {
        exportAsText(data);
      }

      if (exportPreferences.format === "json") {
        exportAsJSON(data);
      }

      if (exportPreferences.format === "pdf") {
        exportAsPrintablePDF(data);
      }

      showToast("Journal export created ✓");
    }

    exportButtons.forEach((button) => {
      button.addEventListener("click", () => {
        openExportWindow(
          button.dataset.view
        );
      });
    });

    savePreferencesButton.addEventListener(
      "click",
      savePreferences
    );

    exportNowButton.addEventListener(
      "click",
      startExport
    );

    closeButton.addEventListener(
      "click",
      closeExportWindow
    );

    exitButton.addEventListener(
      "click",
      closeExportWindow
    );

    backToJournalButton.addEventListener(
      "click",
      () => {
        window.location.href =
          "journal.html";
      }
    );

    modalOverlay.addEventListener(
      "click",
      (event) => {
        if (event.target === modalOverlay) {
          closeExportWindow();
        }
      }
    );

    exportModal.addEventListener(
      "click",
      (event) => {
        event.stopPropagation();
      }
    );

    document.addEventListener(
      "keydown",
      (event) => {
        if (
          event.key === "Escape" &&
          modalOverlay.classList.contains(
            "open"
          )
        ) {
          closeExportWindow();
        }
      }
    );

    loadPreferences();
  </script>

  <script src="performance.js"></script>

</body>
</html>
