<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >

  <title>Insights</title>

  <link rel="stylesheet" href="performance.css">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --background-top: #fffafb;
      --background-middle: #eee9ed;
      --background-bottom: #817e8c;

      --panel-light: #ead8da;
      --panel-dark: #c5adb0;

      --button-light: #efb5aa;
      --button-middle: #d9a099;
      --button-dark: #ae8985;

      --dark: #171416;
      --soft-dark: #51444a;
      --white: #ffffff;
    }

    html {
      min-height: 100%;
      background: var(--background-bottom);
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;

      overflow-x: hidden;

      color: var(--dark);

      font-family:
        Inter,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;

      background:
        radial-gradient(
          circle at 24% 7%,
          rgba(255, 255, 255, 0.9),
          transparent 31%
        ),
        linear-gradient(
          180deg,
          var(--background-top) 0%,
          var(--background-middle) 40%,
          var(--background-bottom) 100%
        );
    }

    button {
      border: 0;
      font: inherit;
      cursor: pointer;
      touch-action: manipulation;
    }

    /* =====================================
       ANIMATED WHITE BUBBLES
    ===================================== */

    .bubbles {
      position: fixed;
      inset: 0;
      z-index: 0;

      overflow: hidden;
      pointer-events: none;
    }

    .bubble {
      position: absolute;
      bottom: -55px;

      width: var(--size);
      height: var(--size);

      border: 1px solid rgba(255, 255, 255, 0.45);
      border-radius: 50%;

      background: rgba(255, 255, 255, 0.11);

      box-shadow:
        inset 0 0 12px rgba(255, 255, 255, 0.28),
        0 4px 17px rgba(255, 255, 255, 0.08);

      animation: rise var(--duration) linear infinite;
      animation-delay: var(--delay);
    }

    .bubble:nth-child(1) {
      left: 7%;
      --size: 18px;
      --duration: 17s;
      --delay: -4s;
    }

    .bubble:nth-child(2) {
      left: 24%;
      --size: 11px;
      --duration: 14s;
      --delay: -9s;
    }

    .bubble:nth-child(3) {
      left: 43%;
      --size: 25px;
      --duration: 21s;
      --delay: -13s;
    }

    .bubble:nth-child(4) {
      left: 63%;
      --size: 15px;
      --duration: 16s;
      --delay: -6s;
    }

    .bubble:nth-child(5) {
      left: 79%;
      --size: 21px;
      --duration: 19s;
      --delay: -11s;
    }

    .bubble:nth-child(6) {
      left: 92%;
      --size: 12px;
      --duration: 15s;
      --delay: -7s;
    }

    @keyframes rise {
      0% {
        transform: translate3d(0, 0, 0);
        opacity: 0;
      }

      12% {
        opacity: 0.7;
      }

      50% {
        transform: translate3d(11px, -55vh, 0);
      }

      100% {
        transform: translate3d(-8px, -115vh, 0);
        opacity: 0;
      }
    }

    /* =====================================
       MAIN APP
    ===================================== */

    .app {
      position: relative;
      z-index: 1;

      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      min-height: 100dvh;

      margin: 0 auto;

      padding:
        max(13px, env(safe-area-inset-top))
        20px
        max(25px, env(safe-area-inset-bottom));
    }

    /* =====================================
       HEADER
    ===================================== */

    .header {
      display: flex;
      align-items: center;
      gap: 12px;

      margin-bottom: 11px;
    }

    .logo-button {
      display: grid;
      place-items: center;

      width: 56px;
      min-width: 56px;
      height: 56px;

      border: 10px solid rgba(255, 255, 255, 0.94);
      border-radius: 50%;

      color: white;
      background: #17181c;

      box-shadow:
        0 3px 8px rgba(0, 0, 0, 0.18),
        inset 0 0 0 1px rgba(255, 255, 255, 0.06);
    }

    .logo-symbol {
      font-size: 25px;
      line-height: 1;
      pointer-events: none;
    }

    .brand-name {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 16px;
      font-weight: 500;
    }

    /* =====================================
       TITLE
    ===================================== */

    .title-wrapper {
      display: flex;
      justify-content: center;

      width: 100%;
      margin-bottom: 13px;
    }

    .title-box {
      width: fit-content;
      max-width: 95%;

      padding: 9px 28px;

      text-align: center;

      background: rgba(255, 255, 255, 0.71);

      box-shadow:
        0 7px 22px rgba(77, 70, 77, 0.06);
    }

    .page-title {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(32px, 9vw, 41px);
      font-weight: 500;
      font-style: italic;
      line-height: 1;
      letter-spacing: -1.3px;
    }

    .page-subtitle {
      max-width: 290px;
      margin: 7px auto 0;

      font-family: Georgia, "Times New Roman", serif;
      font-size: 13px;
      line-height: 1.38;

      color: rgba(43, 37, 40, 0.58);
    }

    /* =====================================
       INSIGHTS PANEL
    ===================================== */

    .insights-panel {
      min-height: 760px;

      padding: 54px 14px 45px;

      border: 2px solid rgba(177, 112, 112, 0.5);
      border-radius: 66px;

      background:
        radial-gradient(
          circle at 50% 6%,
          rgba(255, 255, 255, 0.24),
          transparent 35%
        ),
        linear-gradient(
          145deg,
          var(--panel-light),
          var(--panel-dark)
        );

      box-shadow:
        0 13px 23px rgba(45, 38, 48, 0.29),
        inset 5px 5px 14px rgba(255, 255, 255, 0.23),
        inset -7px -7px 15px rgba(104, 75, 84, 0.15);
    }

    .insights-buttons {
      display: flex;
      flex-direction: column;
      gap: 25px;
    }

    /* =====================================
       FULLY CLICKABLE SECTIONS
    ===================================== */

    .insight-button {
      position: relative;

      display: flex;
      align-items: center;
      justify-content: center;

      width: 100%;
      min-height: 139px;

      padding: 18px 27px;

      border: 1.5px solid #171517;
      border-radius: 999px;

      color: var(--dark);

      text-align: center;

      background:
        linear-gradient(
          100deg,
          var(--button-light) 0%,
          var(--button-middle) 52%,
          var(--button-dark) 100%
        );

      box-shadow:
        0 12px 10px rgba(61, 49, 57, 0.37),
        inset 3px 3px 5px rgba(255, 255, 255, 0.32),
        inset -4px -4px 8px rgba(83, 56, 57, 0.18);

      transition:
        transform 160ms ease,
        box-shadow 160ms ease,
        filter 160ms ease;
    }

    .insight-button:hover {
      filter: brightness(1.035);
    }

    .insight-button:active {
      transform: translateY(4px) scale(0.986);

      box-shadow:
        0 6px 7px rgba(61, 49, 57, 0.31),
        inset 2px 2px 5px rgba(90, 59, 63, 0.14);
    }

    .button-content,
    .button-icon,
    .button-title,
    .button-description,
    .button-arrow {
      pointer-events: none;
    }

    .button-content {
      display: block;
      max-width: 270px;
    }

    .button-icon {
      display: block;

      margin-bottom: 6px;

      font-size: 29px;
    }

    .button-title {
      display: block;

      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(21px, 5.8vw, 26px);
      line-height: 1.15;
    }

    .button-description {
      display: block;

      margin-top: 6px;

      font-size: 11px;
      line-height: 1.42;

      color: rgba(51, 40, 45, 0.63);
    }

    .button-arrow {
      position: absolute;
      right: 23px;

      font-family: Arial, sans-serif;
      font-size: 22px;

      color: rgba(55, 43, 48, 0.52);
    }

    .reminder-badge {
      position: absolute;
      top: 14px;
      right: 26px;

      padding: 5px 9px;

      border-radius: 999px;

      color: white;
      background: rgba(76, 56, 63, 0.64);

      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.8px;
      text-transform: uppercase;

      pointer-events: none;
    }

    /* =====================================
       BACK BUTTON
    ===================================== */

    .back-button {
      display: block;

      width: 73%;
      min-height: 56px;

      margin: 21px auto 0;

      border: 1.5px solid var(--dark);
      border-radius: 999px;

      color: var(--dark);
      background: #e1e1e1;

      font-family: Georgia, "Times New Roman", serif;
      font-size: 25px;
      font-weight: 700;
      letter-spacing: -0.7px;

      box-shadow:
        0 7px 8px rgba(34, 30, 38, 0.35),
        inset 2px 2px 4px rgba(255, 255, 255, 0.78);

      transition:
        transform 160ms ease,
        box-shadow 160ms ease;
    }

    .back-button:active {
      transform: translateY(3px);
    }

    button:focus-visible {
      outline: 3px solid rgba(255, 255, 255, 0.95);
      outline-offset: 3px;
    }

    /* =====================================
       SMALL PHONES
    ===================================== */

    @media (max-width: 370px) {
      .app {
        padding-left: 14px;
        padding-right: 14px;
      }

      .insights-panel {
        min-height: 730px;

        padding-left: 11px;
        padding-right: 11px;

        border-radius: 57px;
      }

      .insight-button {
        min-height: 132px;
      }

      .button-title {
        font-size: 20px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

<body>

  <div class="bubbles" aria-hidden="true">
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>
  </div>

  <main class="app">

    <header class="header">

      <button
        class="logo-button"
        id="backToMainButton"
        type="button"
        aria-label="Return to the main page"
      >
        <span class="logo-symbol">✦</span>
      </button>

      <p class="brand-name">
        Daily Mindset Builder
      </p>

    </header>

    <div class="title-wrapper">

      <div class="title-box">

        <h1 class="page-title">
          Insights
        </h1>

        <p class="page-subtitle">
          Understand your patterns, celebrate your growth
          and stay connected to yourself
        </p>

      </div>

    </div>

    <section class="insights-panel">

      <div class="insights-buttons">

        <!-- Section 1 -->

        <button
          class="insight-button"
          type="button"
          onclick="window.location.href='mindset-patterns.html'"
        >
          <span class="button-content">

            <span class="button-icon">🧠</span>

            <span class="button-title">
              Mindset Patterns
            </span>

            <span class="button-description">
              Discover repeating thoughts, emotional themes
              and personal mindset habits
            </span>

          </span>

          <span class="button-arrow">›</span>
        </button>

        <!-- Section 2 -->

        <button
          class="insight-button"
          type="button"
          onclick="window.location.href='mood-energy-trends.html'"
        >
          <span class="button-content">

            <span class="button-icon">📈</span>

            <span class="button-title">
              Mood &amp; Energy Trends
            </span>

            <span class="button-description">
              Understand how your mood, motivation and
              energy change over time
            </span>

          </span>

          <span class="button-arrow">›</span>
        </button>

        <!-- Section 3 -->

        <button
          class="insight-button"
          type="button"
          onclick="window.location.href='self-reminders.html'"
        >
          <span class="reminder-badge">
            Phone alerts
          </span>

          <span class="button-content">

            <span class="button-icon">🔔</span>

            <span class="button-title">
              Smart Self-Reminders
            </span>

            <span class="button-description">
              Create supportive reminders that can appear
              automatically on the user’s phone
            </span>

          </span>

          <span class="button-arrow">›</span>
        </button>

        <!-- Section 4 -->

        <button
          class="insight-button"
          type="button"
          onclick="window.location.href='weekly-growth-summary.html'"
        >
          <span class="button-content">

            <span class="button-icon">🌱</span>

            <span class="button-title">
              Weekly Growth Summary
            </span>

            <span class="button-description">
              Review meaningful wins, challenges, lessons
              and personal progress from each week
            </span>

          </span>

          <span class="button-arrow">›</span>
        </button>

      </div>

    </section>

    <button
      class="back-button"
      id="backButton"
      type="button"
    >
      BACK
    </button>

  </main>

  <script>
    const backToMainButton =
      document.getElementById("backToMainButton");

    const backButton =
      document.getElementById("backButton");

    function returnToMainPage() {
      window.location.href = "index.html";
    }

    backToMainButton.addEventListener(
      "click",
      returnToMainPage
    );

    backButton.addEventListener(
      "click",
      returnToMainPage
    );
  </script>

  <script src="performance.js"></script>

</body>
</html>
