<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Mindset Builder - Result</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      background: #1c1c1c;
      font-family: Georgia, "Times New Roman", serif;
    }

    .screen {
      width: 412px;
      min-height: 917px;
      padding: 18px 10px 66px;
      background: linear-gradient(
        180deg,
        #f8f6f8 0%,
        #ded9de 35%,
        #b9b0ba 68%,
        #8c8497 100%
      );
      color: #000;
      position: relative;
      overflow: hidden;
      animation: pageOpen 0.8s ease forwards;
    }

    @keyframes pageOpen {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .top {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 45px;
    }

    .logo-wrap {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.75);
      display: flex;
      justify-content: center;
      align-items: center;
      margin-left: 1px;
    }

    .logo {
      width: 43px;
      height: 43px;
      border-radius: 12px;
      background: #151515;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 25px;
      animation: logoPulse 3s ease-in-out infinite;
    }

    @keyframes logoPulse {
      0%, 100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.07);
      }
    }

    .brand {
      font-size: 16px;
      margin-top: -5px;
    }

    .main-title {
      text-align: center;
      font-size: 31px;
      font-style: italic;
      font-weight: 400;
      margin-bottom: 27px;
    }

    .result-title {
      width: 280px;
      height: 43px;
      margin: 0 auto 27px;
      background: rgba(255, 255, 255, 0.82);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 30px;
      font-style: italic;
      font-weight: 400;
    }

    .quote-card {
      width: 374px;
      height: 354px;
      margin: 0 auto;
      border-radius: 42px;
      background: rgba(226, 202, 204, 0.78);
      box-shadow:
        0 27px 28px rgba(0, 0, 0, 0.30),
        0 0 11px rgba(132, 45, 45, 0.58),
        inset 0 0 22px rgba(255, 255, 255, 0.24);
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
      overflow: hidden;
      animation: smoothFloat 4s ease-in-out infinite;
    }

    @keyframes smoothFloat {
      0%, 100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-5px);
      }
    }

    .quote-card::before {
      content: "";
      position: absolute;
      width: 120px;
      height: 600px;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255, 255, 255, 0.28),
        transparent
      );
      top: -120px;
      left: -160px;
      transform: rotate(18deg);
      animation: shine 5s ease-in-out infinite;
    }

    @keyframes shine {
      0% {
        left: -170px;
      }

      45% {
        left: 430px;
      }

      100% {
        left: 430px;
      }
    }

    .quote {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 39px;
      line-height: 1.34;
      font-weight: 400;
      z-index: 2;
      transition: 0.35s ease;
      margin-top: -5px;
    }

    .quote.fade {
      opacity: 0;
      transform: translateY(12px) scale(0.98);
    }

    .arrows {
      position: absolute;
      bottom: 22px;
      left: 34px;
      right: 34px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 3;
    }

    .arrow-btn {
      width: 75px;
      height: 28px;
      border: none;
      background: transparent;
      color: white;
      font-size: 31px;
      line-height: 20px;
      cursor: pointer;
      transition: 0.25s ease;
      font-family: Arial, Helvetica, sans-serif;
    }

    .arrow-btn:hover {
      transform: scale(1.15);
      filter: drop-shadow(0 0 6px white);
    }

    .explanation {
      width: 300px;
      height: 106px;
      margin: 22px auto 74px;
      background: rgba(224, 170, 160, 0.82);
      box-shadow:
        0 8px 15px rgba(0, 0, 0, 0.28),
        inset 0 0 12px rgba(255, 255, 255, 0.20);
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      font-size: 24px;
      font-style: italic;
      line-height: 1.95;
      transition: 0.35s ease;
    }

    .explanation.fade {
      opacity: 0;
      transform: translateY(10px);
    }

    .bottom-buttons {
      display: flex;
      justify-content: space-between;
      padding: 0 18px;
    }

    .btn {
      height: 59px;
      border: 2px solid #111;
      background: rgba(255, 255, 255, 0.70);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 24px;
      font-style: italic;
      cursor: pointer;
      box-shadow: 0 4px 7px rgba(0, 0, 0, 0.35);
      transition: 0.25s ease;
    }

    .start-btn {
      width: 140px;
    }

    .save-btn {
      width: 163px;
    }

    .btn:hover {
      background: #111;
      color: white;
      transform: translateY(-4px);
      box-shadow: 0 9px 15px rgba(0, 0, 0, 0.45);
    }

    .btn:active {
      transform: scale(0.95);
    }

    .saved-message {
      position: fixed;
      left: 50%;
      bottom: 26px;
      transform: translateX(-50%) translateY(30px);
      background: #111;
      color: white;
      padding: 12px 22px;
      border-radius: 999px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: 0.35s ease;
      z-index: 20;
    }

    .saved-message.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 430px) {
      .screen {
        width: 100vw;
      }
    }
  </style>
</head>

<body>
  <main class="screen">
    <header class="top">
      <div class="logo-wrap">
        <div class="logo">✦</div>
      </div>
      <div class="brand">Daily Mindset Builder</div>
    </header>

    <h1 class="main-title">Daily Mindset Check-In</h1>

    <div class="result-title">Your Mindset Quote</div>

    <section class="quote-card">
      <p class="quote" id="quoteText">
        “Your peace is<br>
        not lost<br>
        It is waiting for<br>
        you to return<br>
        to yourself”
      </p>

      <div class="arrows">
        <button class="arrow-btn" id="prevBtn">←──</button>
        <button class="arrow-btn" id="nextBtn">──→</button>
      </div>
    </section>

    <section class="explanation" id="explanationText">
      Under quote: short<br>
      explanation
    </section>

    <div class="bottom-buttons">
      <button class="btn start-btn" id="startAgainBtn">Start Again</button>
      <button class="btn save-btn" id="saveBtn">Save My Quote</button>
    </div>
  </main>

  <div class="saved-message" id="savedMessage">Quote saved ✦</div>

  <script>
    const quotes = [
      {
        quote: "“Your peace is<br>not lost<br>It is waiting for<br>you to return<br>to yourself”",
        explanation: "Under quote: short<br>explanation"
      },
      {
        quote: "“You do not need<br>to fix everything<br>today<br>One small step<br>is enough”",
        explanation: "A soft reminder to breathe<br>and move slowly."
      },
      {
        quote: "“Rest is not<br>weakness<br>Rest is how<br>your energy<br>comes back”",
        explanation: "This quote is for tired days<br>when you need care."
      },
      {
        quote: "“Your future is<br>built by the brave<br>choice you make<br>today”",
        explanation: "A quote for confidence<br>and motivation."
      },
      {
        quote: "“Soft days are<br>still part of<br>your healing”",
        explanation: "A gentle reminder that<br>growth can be quiet."
      }
    ];

    let currentQuote = 0;

    const quoteText = document.getElementById("quoteText");
    const explanationText = document.getElementById("explanationText");
    const savedMessage = document.getElementById("savedMessage");

    function showQuote(index) {
      quoteText.classList.add("fade");
      explanationText.classList.add("fade");

      setTimeout(() => {
        quoteText.innerHTML = quotes[index].quote;
        explanationText.innerHTML = quotes[index].explanation;

        quoteText.classList.remove("fade");
        explanationText.classList.remove("fade");
      }, 300);
    }

    document.getElementById("nextBtn").addEventListener("click", () => {
      currentQuote++;

      if (currentQuote >= quotes.length) {
        currentQuote = 0;
      }

      showQuote(currentQuote);
    });

    document.getElementById("prevBtn").addEventListener("click", () => {
      currentQuote--;

      if (currentQuote < 0) {
        currentQuote = quotes.length - 1;
      }

      showQuote(currentQuote);
    });

    document.getElementById("saveBtn").addEventListener("click", () => {
      const savedQuotes = JSON.parse(localStorage.getItem("savedQuotes")) || [];

      savedQuotes.push({
        quote: quoteText.innerText,
        explanation: explanationText.innerText,
        savedAt: new Date().toISOString()
      });

      localStorage.setItem("savedQuotes", JSON.stringify(savedQuotes));

      savedMessage.classList.add("show");

      setTimeout(() => {
        savedMessage.classList.remove("show");
      }, 1800);
    });

    document.getElementById("startAgainBtn").addEventListener("click", () => {
      window.location.href = "index.html";
    });
  </script>
</body>
</html>
