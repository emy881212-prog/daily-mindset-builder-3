<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Mindset Quote</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.95), transparent 35%),
        linear-gradient(180deg, #f8f6f8 0%, #d7ccd0 45%, #8b8498 100%);
      display: flex;
      justify-content: center;
      color: #050505;
      overflow-x: hidden;
    }

    .app-screen {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      padding: 18px 20px 30px;
      position: relative;
      animation: pageFade 0.8s ease forwards;
    }

    @keyframes pageFade {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .top-bar {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 60px;
    }

    .logo {
      width: 48px;
      height: 48px;
      border-radius: 17px;
      background: #111;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      box-shadow: 0 0 0 10px rgba(255,255,255,0.6);
      animation: softPulse 3s ease-in-out infinite;
    }

    @keyframes softPulse {
      0%, 100% {
        transform: scale(1);
        box-shadow: 0 0 0 10px rgba(255,255,255,0.55);
      }
      50% {
        transform: scale(1.05);
        box-shadow: 0 0 0 14px rgba(255,255,255,0.35);
      }
    }

    .brand {
      font-size: 16px;
    }

    h1 {
      text-align: center;
      font-size: 30px;
      font-style: italic;
      font-weight: 400;
      margin-bottom: 28px;
    }

    .result-title {
      width: fit-content;
      margin: 0 auto 26px;
      padding: 4px 14px;
      background: rgba(255,255,255,0.75);
      font-size: 30px;
      font-style: italic;
      box-shadow: 0 10px 22px rgba(255,255,255,0.25);
    }

    .quote-card {
      min-height: 355px;
      border-radius: 42px;
      background: rgba(224, 198, 201, 0.78);
      box-shadow:
        0 26px 30px rgba(0,0,0,0.28),
        0 0 14px rgba(145, 72, 72, 0.45),
        inset 0 0 25px rgba(255,255,255,0.28);
      padding: 34px 30px 54px;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
      animation: floatCard 4.5s ease-in-out infinite;
    }

    @keyframes floatCard {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-7px);
      }
    }

    .quote-card::before {
      content: "";
      position: absolute;
      top: -40%;
      left: -80%;
      width: 80%;
      height: 180%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,0.35),
        transparent
      );
      transform: rotate(18deg);
      animation: shine 5s ease-in-out infinite;
    }

    @keyframes shine {
      0% {
        left: -90%;
      }
      45% {
        left: 120%;
      }
      100% {
        left: 120%;
      }
    }

    .quote-text {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 38px;
      line-height: 1.34;
      z-index: 2;
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    .quote-text.change {
      opacity: 0;
      transform: translateY(10px) scale(0.98);
    }

    .arrow-row {
      position: absolute;
      bottom: 25px;
      left: 34px;
      right: 34px;
      display: flex;
      justify-content: space-between;
      z-index: 3;
    }

    .arrow-btn {
      border: none;
      background: transparent;
      font-size: 42px;
      color: white;
      cursor: pointer;
      transition: 0.25s ease;
      padding: 0 8px;
      line-height: 1;
    }

    .arrow-btn:hover {
      transform: scale(1.2);
      text-shadow: 0 0 10px rgba(255,255,255,0.9);
    }

    .explanation-box {
      width: 82%;
      margin: 22px auto 72px;
      padding: 16px 18px;
      background: rgba(223, 169, 160, 0.72);
      box-shadow:
        0 8px 16px rgba(0,0,0,0.27),
        inset 0 0 12px rgba(255,255,255,0.24);
      text-align: center;
      font-size: 24px;
      font-style: italic;
      line-height: 1.55;
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    .explanation-box.change {
      opacity: 0;
      transform: translateY(8px);
    }

    .buttons {
      display: flex;
      justify-content: space-between;
      gap: 28px;
    }

    .action-btn {
      flex: 1;
      min-height: 58px;
      border: 2px solid #111;
      background: rgba(255,255,255,0.72);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 22px;
      font-style: italic;
      cursor: pointer;
      box-shadow: 0 5px 9px rgba(0,0,0,0.25);
      transition: 0.25s ease;
    }

    .action-btn:hover {
      background: #111;
      color: white;
      transform: translateY(-4px);
      box-shadow: 0 10px 18px rgba(0,0,0,0.35);
    }

    .action-btn:active {
      transform: scale(0.96);
    }

    .saved-message {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(30px);
      background: #111;
      color: white;
      padding: 12px 22px;
      border-radius: 999px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: 0.35s ease;
    }

    .saved-message.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 390px) {
      .app-screen {
        padding: 16px 18px 28px;
      }

      .top-bar {
        margin-bottom: 52px;
      }

      h1 {
        font-size: 28px;
      }

      .result-title {
        font-size: 28px;
      }

      .quote-text {
        font-size: 34px;
      }

      .action-btn {
        font-size: 20px;
      }

      .buttons {
        gap: 18px;
      }
    }
  </style>
</head>

<body>
  <main class="app-screen">
    <div class="top-bar">
      <div class="logo">✦</div>
      <div class="brand">Daily Mindset Builder</div>
    </div>

    <h1>Daily Mindset Check-In</h1>

    <div class="result-title">Your Mindset Quote</div>

    <section class="quote-card">
      <p class="quote-text" id="quoteText">
        “Your peace is not lost. It is waiting for you to return to yourself”
      </p>

      <div class="arrow-row">
        <button class="arrow-btn" id="prevBtn">←</button>
        <button class="arrow-btn" id="nextBtn">→</button>
      </div>
    </section>

    <section class="explanation-box" id="explanationText">
      This quote reminds you to slow down, breathe, and come back to your calm center.
    </section>

    <div class="buttons">
      <button class="action-btn" id="startAgainBtn">Start Again</button>
      <button class="action-btn" id="saveBtn">Save My Quote</button>
    </div>
  </main>

  <div class="saved-message" id="savedMessage">Quote saved ✦</div>

  <script>
    const quotes = [
      {
        quote: "“Your peace is not lost. It is waiting for you to return to yourself”",
        explanation: "This quote reminds you to slow down, breathe, and come back to your calm center."
      },
      {
        quote: "“You do not need to fix everything today. One small step is enough”",
        explanation: "This is for stressful days. It reminds you that progress can be gentle and simple."
      },
      {
        quote: "“Rest is not weakness. Rest is how your energy comes back”",
        explanation: "This quote is for tired moments. Your body and mind deserve care before pressure."
      },
      {
        quote: "“Your future is built by the brave choice you make today”",
        explanation: "This quote gives motivation when you need confidence and forward movement."
      },
      {
        quote: "“Soft days are still part of your healing”",
        explanation: "This quote is for emotional days. You are still growing, even when you feel sensitive."
      }
    ];

    let currentQuote = 0;

    const quoteText = document.getElementById("quoteText");
    const explanationText = document.getElementById("explanationText");
    const savedMessage = document.getElementById("savedMessage");

    function showQuote(index) {
      quoteText.classList.add("change");
      explanationText.classList.add("change");

      setTimeout(() => {
        quoteText.textContent = quotes[index].quote;
        explanationText.textContent = quotes[index].explanation;

        quoteText.classList.remove("change");
        explanationText.classList.remove("change");
      }, 300);
    }

    document.getElementById("nextBtn").addEventListener("click", () => {
      currentQuote++;

      if (currentQuote >= quotes.length) {
        currentQuote = 0;
      }

      showQuote(currentQuote);
    });

    document.getElementById("prevBtn").addEventListener("click", () => {
      currentQuote--;

      if (currentQuote < 0) {
        currentQuote = quotes.length - 1;
      }

      showQuote(currentQuote);
    });

    document.getElementById("saveBtn").addEventListener("click", () => {
      const savedQuotes = JSON.parse(localStorage.getItem("savedQuotes")) || [];
      savedQuotes.push(quotes[currentQuote]);
      localStorage.setItem("savedQuotes", JSON.stringify(savedQuotes));

      savedMessage.classList.add("show");

      setTimeout(() => {
        savedMessage.classList.remove("show");
      }, 1800);
    });

    document.getElementById("startAgainBtn").addEventListener("click", () => {
      window.location.href = "index.html";
    });
  </script>
</body>
</html>
