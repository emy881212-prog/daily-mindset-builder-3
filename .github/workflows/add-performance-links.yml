name: Connect performance files to all HTML pages

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/add-performance-links.yml"

permissions:
  contents: write

jobs:
  update-html-pages:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Add performance CSS and JavaScript to every HTML page
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os
          import re

          root = Path.cwd()
          updated = []

          for page in sorted(root.rglob("*.html")):
              if ".git" in page.parts:
                  continue

              original = page.read_text(encoding="utf-8")
              content = original

              css_path = os.path.relpath(root / "performance.css", page.parent).replace(os.sep, "/")
              js_path = os.path.relpath(root / "performance.js", page.parent).replace(os.sep, "/")

              css_tag = f'<link rel="stylesheet" href="{css_path}">'
              js_tag = f'<script src="{js_path}"></script>'

              has_performance_css = re.search(
                  r'<link\b[^>]*href=["\'][^"\']*performance\.css["\'][^>]*>',
                  content,
                  flags=re.IGNORECASE,
              )

              if not has_performance_css:
                  content, count = re.subn(
                      r'(</head\s*>)',
                      f'  {css_tag}\n\\1',
                      content,
                      count=1,
                      flags=re.IGNORECASE,
                  )
                  if count == 0:
                      print(f"Skipped CSS insertion in {page}: no </head> tag")

              has_performance_js = re.search(
                  r'<script\b[^>]*src=["\'][^"\']*performance\.js["\'][^>]*>\s*</script>',
                  content,
                  flags=re.IGNORECASE,
              )

              if not has_performance_js:
                  content, count = re.subn(
                      r'(</body\s*>)',
                      f'  {js_tag}\n\\1',
                      content,
                      count=1,
                      flags=re.IGNORECASE,
                  )
                  if count == 0:
                      print(f"Skipped JavaScript insertion in {page}: no </body> tag")

              if content != original:
                  page.write_text(content, encoding="utf-8")
                  updated.append(str(page.relative_to(root)))

          print("Updated HTML pages:")
          for filename in updated:
              print(f"- {filename}")
          PY

      - name: Commit updated HTML pages
        shell: bash
        run: |
          if git diff --quiet; then
            echo "All HTML pages already include the performance files."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- '*.html'
          git commit -m "Connect performance files to all HTML pages"
          git push origin main
